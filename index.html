<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Interactive radio frequency bands reference — 15 kHz to 5 GHz spectrum with modulations, propagation and usage details.">
    <title>RF Spectrum // 15 kHz – 5 GHz</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── reset & base ──────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'JetBrains Mono',monospace;background:#0a0a0f;color:#c8ccd0;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── scanline overlay ──────────────────────────────────────── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px)}

/* ── app shell ─────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}

/* ── top bar ───────────────────────────────────────────────── */
.top-bar{flex:0 0 32px;display:flex;align-items:center;padding:0 14px;
  background:linear-gradient(90deg,#0c0e16,#10131c);border-bottom:1px solid #1e2536;gap:10px;z-index:10}
.top-bar .title{font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#00ff88;white-space:nowrap;text-decoration:none;cursor:pointer}
.top-bar .title:hover{animation:glitch .3s ease-in-out}
@keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(-2px,-2px)}60%{transform:translate(2px,2px)}80%{transform:translate(2px,-2px)}100%{transform:translate(0)}}
.top-bar .range{font-size:12px;color:#9aaabe;letter-spacing:1px}
.top-bar .dot{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px #00ff88;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── main content area ─────────────────────────────────────── */
.main{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── left: band panel ──────────────────────────────────────── */
.band-panel{flex:0 0 120px;display:flex;flex-direction:column;justify-content:safe center;gap:3px;padding:4px;
  background:linear-gradient(180deg,#0c0e16,#0e1018);border-right:1px solid #1a1f2e;z-index:5;overflow-y:auto;overflow-x:hidden}
.band-panel::-webkit-scrollbar{width:2px}
.band-panel::-webkit-scrollbar-thumb{background:#1e2536;border-radius:2px}

/* ── SC‑style band button ──────────────────────────────────── */
.band-btn{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px 4px;cursor:pointer;user-select:none;transition:all .25s ease;flex-shrink:0;
  clip-path:polygon(6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px),0 6px);
  background:linear-gradient(180deg,#151a28 0%,#0f1220 50%,#151a28 100%)}
.band-btn .label{font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:color .25s}
.band-btn .freq{font-size:10px;color:#8a9aae;letter-spacing:.5px;margin-top:1px;transition:color .25s}
.band-btn:hover{filter:brightness(1.3)}
.band-btn:hover .label{color:#c0d0e0}
.band-btn.active{animation:pulse-glow 2.5s ease-in-out infinite}
.band-btn.active .label{font-weight:700}

/* per‑band accent colours (spectrum order) */
.band-btn[data-band="vlf"]  .label{color:#8a5050}.band-btn[data-band="vlf"].active  .label{color:#ff4444}
.band-btn[data-band="lf"]   .label{color:#8a6a40}.band-btn[data-band="lf"].active   .label{color:#ff8833}
.band-btn[data-band="mf"]   .label{color:#8a8030}.band-btn[data-band="mf"].active   .label{color:#ffc833}
.band-btn[data-band="hf"]   .label{color:#608a30}.band-btn[data-band="hf"].active   .label{color:#aaff33}
.band-btn[data-band="vhf"]  .label{color:#308a5a}.band-btn[data-band="vhf"].active  .label{color:#33ff88}
.band-btn[data-band="uhf"]  .label{color:#305a8a}.band-btn[data-band="uhf"].active  .label{color:#33aaff}
.band-btn[data-band="shf"]  .label{color:#60408a}.band-btn[data-band="shf"].active  .label{color:#aa66ff}

/* special tab buttons */
.band-btn[data-band="glossary"] .label{color:#5a6a7a}
.band-btn[data-band="glossary"].active .label{color:#88ccff}
.band-btn[data-band="glossary"]::after{background:#88ccff}
.band-btn[data-band="propagation"] .label{color:#5a6a7a}
.band-btn[data-band="propagation"].active .label{color:#ffaa44}
.band-btn[data-band="propagation"]::after{background:#ffaa44}

@keyframes pulse-glow{0%,100%{filter:drop-shadow(0 0 4px rgba(255,255,255,.15)) brightness(1.1)}50%{filter:drop-shadow(0 0 10px rgba(255,255,255,.25)) brightness(1.25)}}

/* small coloured bar under button */
.band-btn::after{content:'';position:absolute;bottom:2px;left:20%;right:20%;height:2px;border-radius:1px;opacity:.35;transition:opacity .25s}
.band-btn.active::after{opacity:.9}
.band-btn[data-band="vlf"]::after{background:#ff4444}
.band-btn[data-band="lf"]::after{background:#ff8833}
.band-btn[data-band="mf"]::after{background:#ffc833}
.band-btn[data-band="hf"]::after{background:#aaff33}
.band-btn[data-band="vhf"]::after{background:#33ff88}
.band-btn[data-band="uhf"]::after{background:#33aaff}
.band-btn[data-band="shf"]::after{background:#aa66ff}

/* separator line between bands and special tabs */
.band-sep{height:1px;background:linear-gradient(90deg,transparent,#1e2536,transparent);margin:2px 8px;flex-shrink:0}

/* ── middle: sub‑band panel ────────────────────────────────── */
.sub-panel{flex:0 0 0;overflow:hidden;transition:flex-basis .35s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0;
  display:flex;flex-direction:column;background:#0b0d15;border-right:1px solid #1a1f2e}
.sub-panel.open{flex-basis:210px;opacity:1}
.sub-panel-inner{display:flex;flex-direction:column;gap:3px;padding:6px;overflow-y:auto;overflow-x:hidden;flex:1;min-height:0}
.sub-panel-inner::-webkit-scrollbar{width:3px}
.sub-panel-inner::-webkit-scrollbar-thumb{background:#1e2536;border-radius:2px}
.sub-panel-header{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#9aaabe;padding:4px 8px 2px;white-space:nowrap;flex-shrink:0}

/* sub‑band button */
.sub-btn{position:relative;padding:5px 8px;cursor:pointer;user-select:none;font-size:13px;font-weight:500;
  color:#6a7a90;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .2s ease;
  clip-path:polygon(4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px),0 4px);
  background:linear-gradient(180deg,#13162200,#111420)}
.sub-btn:hover{background:linear-gradient(180deg,#1a1e30,#151828);color:#a0b0c8}
.sub-btn.active{color:#fff;background:linear-gradient(180deg,#181e32,#141a2c)}
.sub-btn .sub-freq{display:block;font-size:11px;color:#8a9aae;margin-top:1px;font-weight:400;transition:color .2s}
.sub-btn.active .sub-freq{color:#a0b0c8}

/* ── right: detail panel ───────────────────────────────────── */
.detail-panel{flex:1;overflow:hidden;opacity:0;transition:opacity .3s ease .1s;display:flex;flex-direction:column;
  background:linear-gradient(135deg,#0a0c14,#0d0f18);min-width:0}
.detail-panel.open,.detail-panel:has(.intro){opacity:1}
.detail-inner{padding:12px 16px;overflow-y:auto;flex:1;min-height:0}
.detail-inner::-webkit-scrollbar{width:3px}
.detail-inner::-webkit-scrollbar-thumb{background:#1e2536;border-radius:2px}

/* detail: header */
.detail-title{font-size:20px;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.detail-subtitle{font-size:12px;color:#9aaabe;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}

/* detail: data table */
.detail-table{width:100%;border-collapse:collapse;table-layout:fixed}
.detail-table{width:100%;border-collapse:collapse;table-layout:auto}
.detail-table th{text-align:left;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#9aaec4;
  padding:8px 12px;border-bottom:1px solid #1a1f2e;white-space:nowrap;vertical-align:top}
.detail-table td{font-size:14px;color:#d4e0ec;padding:8px 12px;border-bottom:1px solid #12151e;vertical-align:top;word-wrap:break-word;overflow-wrap:break-word}
.detail-table tr:last-child th,.detail-table tr:last-child td{border-bottom:none}

/* coloured accent bar in detail */
.accent-bar{height:3px;border-radius:1px;margin-bottom:10px;opacity:.7}

/* wavelength visual */
.wave-vis{display:flex;align-items:center;gap:6px;margin-top:8px;padding:6px 0}
.wave-vis svg{flex-shrink:0}
.wave-vis .wave-label{font-size:12px;color:#9aaabe;letter-spacing:.5px}

/* ── glossary terms in detail ──────────────────────────────── */
.glossary-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.glossary-item{padding:5px 10px;border-bottom:1px solid #12151e}
.glossary-item:nth-child(odd){border-right:1px solid #12151e}
.glossary-term{font-size:13px;font-weight:600;color:#88ccff;margin-bottom:1px}
.glossary-def{font-size:13px;color:#c0ccd8;line-height:1.4}
.glossary-cat{grid-column:1/-1;font-size:16px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#ffaa44;padding:12px 10px 6px;border-bottom:2px solid #ffaa44}

/* ── propagation panel ─────────────────────────────────────── */
.prop-section{margin-bottom:14px}
.prop-section h3{font-size:14px;font-weight:600;color:#ffaa44;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.prop-section p{font-size:13px;color:#c0ccd8;line-height:1.5;margin-bottom:4px}
.atmo-diagram{width:100%;max-width:900px}
.atmo-diagram text{font-family:'JetBrains Mono',monospace}
.world-map-wrap{position:relative;width:100%;max-width:900px;margin-top:6px}
.world-map-wrap svg{width:100%;height:auto}
.world-map-wrap text{font-family:'JetBrains Mono',monospace}
.prop-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
.prop-legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#b0c0d0}
.prop-legend-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── placeholder / empty state ─────────────────────────────── */
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:#6a7a8e;font-size:14px;letter-spacing:2px;text-transform:uppercase;user-select:none}
.empty-state.intro{flex-direction:column;text-transform:none;letter-spacing:0;gap:0;padding:16px;max-width:520px;overflow:hidden;align-items:center;justify-content:center}
.intro-title{font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.intro-wave{font-size:24px;letter-spacing:4px;margin-bottom:10px;opacity:.6;line-height:1}
.intro-line{font-size:12px;color:#7a8a9e;line-height:1.6;text-align:center}
.intro-line .key{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;background:#1a1f2e;color:#a0b0c8;padding:0 4px;border-radius:3px;font-size:11px;font-weight:600;border:1px solid #2a3040;margin:0 1px;vertical-align:middle;line-height:1;font-family:'JetBrains Mono',monospace}
.intro-line .accent{color:#00ff88}
.intro-sep{width:40px;height:1px;background:linear-gradient(90deg,transparent,#2a3548,transparent);margin:6px auto}
html.light .intro-title{color:#4a5568}
html.light .intro-line{color:#5a6878}
html.light .intro-line .key{background:#dce0e8;color:#2a3040;border-color:#c0c8d4}
html.light .intro-line .accent{color:#00885a}
html.light .intro-sep{background:linear-gradient(90deg,transparent,#c0c8d4,transparent)}

/* ── well-known frequencies section ────────────────────────── */
.wkf-section{margin-top:12px;border-top:1px solid #1a1f2e;padding-top:10px}
.wkf-section h3{font-size:13px;font-weight:600;color:#e0b888;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.wkf-region{margin-bottom:10px}
.wkf-region h4{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;padding:3px 8px;border-left:3px solid;display:inline-block}
.wkf-region h4.wkf-uk{color:#55aaff;border-color:#55aaff}
.wkf-region h4.wkf-usa{color:#ff6655;border-color:#ff6655}
.wkf-region h4.wkf-ru{color:#ffcc33;border-color:#ffcc33}
.wkf-table{width:100%;border-collapse:collapse;margin-bottom:6px}
.wkf-table th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#d4a574;padding:4px 8px;border-bottom:1px solid #1a1f2e;white-space:nowrap}
.wkf-table td{font-size:12px;color:#c8ccd0;padding:3px 8px;border-bottom:1px solid #0e1118}
.wkf-table tr:last-child td{border-bottom:none}
.wkf-table .wkf-freq{color:#e8e0d8;font-weight:500;white-space:nowrap}
.wkf-table .wkf-mod{color:#d4a574;white-space:nowrap}

/* ── bottom bar ────────────────────────────────────────────── */
.bottom-bar{flex:0 0 24px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;
  background:#0c0e16;border-top:1px solid #1a1f2e;font-size:12px;color:#7a8a9e;letter-spacing:1px}

/* ── click ripple ──────────────────────────────────────────── */
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(2.5);opacity:0}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);pointer-events:none;animation:ripple .5s ease-out forwards}

/* ── responsive: tablet ────────────────────────────────────── */
@media(max-width:900px){
  .band-panel{flex:0 0 100px;padding:5px 4px;gap:3px}
  .band-btn .label{font-size:14px}
  .band-btn .freq{font-size:8px}
  .sub-panel.open{flex-basis:175px}
  .sub-btn{font-size:12px;padding:4px 6px}
  .detail-table th{font-size:11px}
  .detail-table td{font-size:13px}
  .glossary-grid{grid-template-columns:1fr}
  .glossary-item:nth-child(odd){border-right:none}
}

/* ── responsive: mobile ────────────────────────────────────── */
@media(max-width:600px){
  .app{overflow-y:auto}
  .main{flex-direction:column;overflow-y:auto;overflow-x:hidden}
  .band-panel{flex:0 0 auto;flex-direction:row;justify-content:flex-start;overflow-x:auto;padding:4px;gap:4px;border-right:none;border-bottom:1px solid #1a1f2e}
  .band-sep{width:1px;height:auto;margin:2px 0;min-height:20px}
  .band-btn{min-width:56px;padding:5px 6px}
  .band-btn .label{font-size:13px}
  .band-btn .freq{display:none}
  .sub-panel{flex:0 0 0;border-right:none;border-bottom:1px solid #1a1f2e;transition:flex-basis .3s,opacity .25s}
  .sub-panel.open{flex-basis:auto}
  .sub-panel-inner{flex-direction:row;flex-wrap:wrap;overflow-y:visible;padding:4px}
  .sub-btn{flex:0 0 auto;font-size:12px;padding:4px 8px}
  .detail-panel{flex:1 1 auto;overflow-y:auto}
  .detail-panel.open{min-height:200px}
  .detail-inner{padding:8px}
  .glossary-grid{grid-template-columns:1fr}
  .glossary-item:nth-child(odd){border-right:none}
  body{overflow:auto}
  html{overflow:auto}
}

/* ── theme toggle button ───────────────────────────────────── */
.theme-toggle{margin-left:auto;background:none;border:none;cursor:pointer;padding:2px 4px;display:flex;align-items:center;color:#9aaabe;transition:color .25s}
.theme-toggle:hover{color:#c8ccd0}
.theme-toggle svg{width:16px;height:16px}
.theme-toggle .icon-sun{display:none}
.light .theme-toggle{color:#5a6878}
.light .theme-toggle:hover{color:#2a2e38}
.light .theme-toggle .icon-sun{display:block}
.light .theme-toggle .icon-moon{display:none}

/* ── LIGHT MODE ────────────────────────────────────────────── */
html.light,html.light body{background:#f0f2f6;color:#2a2e38}
html.light body::after{background:none}

/* top bar */
html.light .top-bar{background:linear-gradient(90deg,#e6e8ee,#eaecf1);border-bottom-color:#c8cdd8}
html.light .top-bar .title{color:#00885a}
html.light .top-bar .range{color:#5a6878}
html.light .top-bar .dot{background:#00885a;box-shadow:0 0 6px #00885a}

/* band panel */
html.light .band-panel{background:linear-gradient(180deg,#e6e8ee,#e8eaef);border-right-color:#c8cdd8}
html.light .band-panel::-webkit-scrollbar-thumb{background:#c8cdd8}
html.light .band-btn{background:linear-gradient(180deg,#dce0e8 0%,#e4e8f0 50%,#dce0e8 100%)}
html.light .band-btn:hover{filter:brightness(0.95)}
html.light .band-btn:hover .label{color:#2a3040}
html.light .band-btn .freq{color:#6a7888}
html.light .band-btn::after{opacity:.5}
html.light .band-btn.active::after{opacity:1}

/* band accent colours — light mode */
html.light .band-btn[data-band="vlf"] .label{color:#cc4444}
html.light .band-btn[data-band="vlf"].active .label{color:#bb2222}
html.light .band-btn[data-band="lf"] .label{color:#bb6622}
html.light .band-btn[data-band="lf"].active .label{color:#aa5500}
html.light .band-btn[data-band="mf"] .label{color:#998811}
html.light .band-btn[data-band="mf"].active .label{color:#887700}
html.light .band-btn[data-band="hf"] .label{color:#558822}
html.light .band-btn[data-band="hf"].active .label{color:#447700}
html.light .band-btn[data-band="vhf"] .label{color:#228844}
html.light .band-btn[data-band="vhf"].active .label{color:#117733}
html.light .band-btn[data-band="uhf"] .label{color:#226688}
html.light .band-btn[data-band="uhf"].active .label{color:#115577}
html.light .band-btn[data-band="shf"] .label{color:#664499}
html.light .band-btn[data-band="shf"].active .label{color:#553388}

html.light .band-btn[data-band="glossary"] .label{color:#8898a8}
html.light .band-btn[data-band="glossary"].active .label{color:#2277cc}
html.light .band-btn[data-band="glossary"]::after{background:#2277cc}
html.light .band-btn[data-band="propagation"] .label{color:#8898a8}
html.light .band-btn[data-band="propagation"].active .label{color:#cc7700}
html.light .band-btn[data-band="propagation"]::after{background:#cc7700}

html.light .band-sep{background:linear-gradient(90deg,transparent,#c8cdd8,transparent)}

/* sub panel */
html.light .sub-panel{background:#eef0f4;border-right-color:#c8cdd8}
html.light .sub-panel-inner::-webkit-scrollbar-thumb{background:#c8cdd8}
html.light .sub-panel-header{color:#5a6878}
html.light .sub-btn{color:#5a6878;background:linear-gradient(180deg,#eef0f400,#e8eaef)}
html.light .sub-btn:hover{background:linear-gradient(180deg,#dde0e8,#e0e4ec);color:#2a3040}
html.light .sub-btn.active{color:#1a1e28;background:linear-gradient(180deg,#d4d8e2,#dce0ea)}
html.light .sub-btn .sub-freq{color:#6a7888}
html.light .sub-btn.active .sub-freq{color:#4a5868}

/* detail panel */
html.light .detail-panel{background:linear-gradient(135deg,#f0f2f6,#eceff3)}
html.light .detail-inner::-webkit-scrollbar-thumb{background:#c8cdd8}
html.light .detail-subtitle{color:#5a6878}
html.light .detail-table th{color:#4a6080;border-bottom-color:#d0d5e0}
html.light .detail-table td{color:#2a3040;border-bottom-color:#e0e4ec}
html.light .wave-vis .wave-label{color:#5a6878}

/* glossary */
html.light .glossary-item{border-bottom-color:#dce0e8}
html.light .glossary-item:nth-child(odd){border-right-color:#dce0e8}
html.light .glossary-term{color:#2266bb}
html.light .glossary-def{color:#3a4558}
html.light .glossary-cat{color:#cc7700;border-bottom-color:#cc7700}

/* propagation */
html.light .prop-section h3{color:#cc7700}
html.light .prop-section p{color:#3a4558}
html.light .prop-legend-item{color:#4a5568}

/* WKF */
html.light .wkf-section{border-top-color:#d0d5e0}
html.light .wkf-section h3{color:#8a6020}
html.light .wkf-region h4.wkf-uk{color:#1166cc;border-color:#1166cc}
html.light .wkf-region h4.wkf-usa{color:#cc3322;border-color:#cc3322}
html.light .wkf-region h4.wkf-ru{color:#bb8800;border-color:#bb8800}
html.light .wkf-table th{color:#7a5530;border-bottom-color:#d0d5e0}
html.light .wkf-table td{color:#2a2e38;border-bottom-color:#e0e4ec}
html.light .wkf-table .wkf-freq{color:#2a3040}
html.light .wkf-table .wkf-mod{color:#7a5530}

/* empty state & bottom bar */
html.light .empty-state{color:#8a94a0}
html.light .bottom-bar{background:#e6e8ee;border-top-color:#c8cdd8;color:#5a6878}

/* ripple */
html.light .ripple{background:rgba(0,0,0,.08)}
</style>
</head>
<body>

  { term:'FM',   def:'Frequency Modulation — signal encoded as changes in wave frequency' },
  { term:'NFM',  def:'Narrow FM — FM with ±5 kHz deviation; used for land mobile, amateur, PMR' },
  { term:'WBFM', def:'Wideband FM — FM with ±75 kHz deviation, used for FM broadcast and weather radio' },
  { term:'SSB',  def:'Single Sideband — AM variant that transmits only one sideband, saving bandwidth and power' },
  { term:'USB',  def:'Upper Sideband — SSB mode transmitting frequencies above the suppressed carrier; standard above 10 MHz and on all VHF+ bands' },
  { term:'LSB',  def:'Lower Sideband — SSB mode transmitting frequencies below the suppressed carrier; standard below 10 MHz by convention' },
  { term:'J3E',  def:'ITU emission designator for SSB with suppressed carrier (voice); the mode used for USB and LSB phone' },
  { term:'F3E',  def:'ITU emission designator for FM telephony (voice); standard for VHF/UHF FM amateur and PMR' },
  { term:'DSB-FC', def:'Double Sideband Full Carrier — standard AM broadcasting with both sidebands and carrier' },
  { term:'ISB',  def:'Independent Sideband — simultaneously transmits different audio on USB and LSB; used in military/diplomatic HF' },
  { term:'CW',   def:'Continuous Wave — unmodulated carrier keyed on/off for Morse code' },
  { term:'OOK',  def:'On-Off Keying — simplest digital modulation: carrier present = 1, absent = 0' },
  { term:'FSK',  def:'Frequency Shift Keying — digital data encoded by shifting between two frequencies' },
  { term:'AFSK', def:'Audio Frequency Shift Keying — FSK applied to audio tones fed into an FM or SSB transmitter; used in packet radio and APRS' },
  { term:'MSK',  def:'Minimum Shift Keying — FSK variant with minimum frequency separation for given data rate' },
  { term:'BPSK', def:'Binary Phase Shift Keying — two phase states (0° and 180°) representing 1 and 0' },
  { term:'QPSK', def:'Quadrature Phase Shift Keying — four phase states encoding 2 bits per symbol' },
  { term:'8PSK', def:'8-Phase Shift Keying — eight phase states encoding 3 bits per symbol' },
  { term:'QAM',  def:'Quadrature Amplitude Modulation — combines amplitude and phase changes; QAM-256/1024 = bits per symbol' },
  { term:'OFDM', def:'Orthogonal Frequency Division Multiplexing — data split across many closely-spaced sub-carriers' },
  { term:'OFDMA',def:'OFDM Access — OFDM with multiple users sharing sub-carriers (used in LTE/5G)' },
  { term:'SC-FDMA', def:'Single Carrier FDMA — uplink modulation in LTE; lower peak-to-average power ratio' },
  { term:'COFDM',def:'Coded OFDM — OFDM with forward error correction built in (DAB, DVB-T)' },
  { term:'DSSS', def:'Direct Sequence Spread Spectrum — signal spread across wide bandwidth using pseudo-random code' },
  { term:'FHSS', def:'Frequency Hopping Spread Spectrum — rapidly switches carrier among many channels (Bluetooth)' },
  { term:'GFSK', def:'Gaussian FSK — FSK with Gaussian filter for smoother transitions (Bluetooth)' },
  { term:'GMSK', def:'Gaussian Minimum Shift Keying — MSK with Gaussian filter; used in GSM' },
  { term:'8DPSK',def:'8-state Differential Phase Shift Keying — encodes data in phase changes between symbols' },
  { term:'BOC',  def:'Binary Offset Carrier — modulation for newer GNSS signals (GPS L1C, Galileo)' },
  { term:'8VSB', def:'8-level Vestigial Sideband — modulation used by ATSC digital TV in North America' },
  { term:'DRM',  def:'Digital Radio Mondiale — digital broadcast standard for shortwave/MW/LW bands' },
  { term:'NBDP', def:'Narrow Band Direct Printing — automated text communication for maritime (radiotelex)' },
  { term:'AMS',  def:'AM Synchronous — synchronous AM detection locking onto the carrier for improved selectivity and reduced fading distortion' },

  { cat:'Protocols & Standards' },
  { term:'LTE',   def:'Long Term Evolution — 4G cellular standard; downlink up to ~300 Mbps' },
  { term:'5G NR', def:'5th Generation New Radio — latest cellular standard; sub-6 GHz and mmWave' },
  { term:'UMTS',  def:'Universal Mobile Telecommunications System — 3G standard using W-CDMA' },
  { term:'W-CDMA',def:'Wideband Code Division Multiple Access — 3G air interface; 5 MHz channels' },
  { term:'CDMA',  def:'Code Division Multiple Access — multiple users share frequency using unique codes' },
  { term:'GSM',   def:'Global System for Mobile Communications — 2G digital cellular standard' },
  { term:'HSPA+', def:'High Speed Packet Access+ — enhanced 3G; up to ~42 Mbps downlink' },
  { term:'MIMO',  def:'Multiple Input Multiple Output — multiple antennas at TX and RX for throughput/reliability' },
  { term:'FDD',   def:'Frequency Division Duplex — separate frequencies for uplink and downlink' },
  { term:'TDD',   def:'Time Division Duplex — same frequency shared between uplink and downlink in alternating time slots' },
  { term:'ATSC',  def:'Advanced Television Systems Committee — US/Canada/Korea digital TV standard' },
  { term:'DVB-T/T2', def:'Digital Video Broadcasting Terrestrial — European digital TV standard; T2 is 2nd generation' },
  { term:'DVB-S/S2', def:'Digital Video Broadcasting Satellite — satellite TV standard; S2 is 2nd generation' },
  { term:'DAB/DAB+', def:'Digital Audio Broadcasting — digital radio standard using OFDM; DAB+ uses HE-AAC v2 codec' },
  { term:'RDS',   def:'Radio Data System — digital data piggybacked on FM broadcasts (station name, traffic info)' },
  { term:'IBOC',  def:'In-Band On-Channel — "HD Radio"; digital sidebands added to analogue FM/AM signal' },
  { term:'HE-AAC v2', def:'High Efficiency Advanced Audio Coding v2 — audio codec for DAB+; near-CD quality at 48-64 kbps' },
  { term:'DSC',   def:'Digital Selective Calling — automated digital system for maritime distress alerts and calling' },
  { term:'AIS',   def:'Automatic Identification System — ships broadcast position, speed, heading on VHF' },
  { term:'GMDSS', def:'Global Maritime Distress and Safety System — international maritime emergency framework' },
  { term:'SAME',  def:'Specific Area Message Encoding — digital coding for targeted weather alerts (NOAA)' },
  { term:'P25',   def:'Project 25 — APCO digital two-way radio standard for public safety (FDMA phase 1, TDMA phase 2)' },
  { term:'TETRA', def:'Terrestrial Trunked Radio — European digital trunked radio standard for emergency services and utilities' },
  { term:'DMR',   def:'Digital Mobile Radio — TDMA-based digital voice standard (Motorola); widely used by amateurs' },
  { term:'NXDN',  def:'Next-Generation Digital Narrowband — 6.25 kHz digital voice/data protocol by Kenwood/Icom' },
  { term:'dPMR',  def:'Digital PMR — 6.25 kHz FDMA digital voice standard for licence-free and licensed PMR' },
  { term:'ALE',   def:'Automatic Link Establishment — protocol for HF radios to automatically select the best frequency and establish a link' },
  { term:'SELCAL', def:'Selective Calling — system allowing ground stations to alert specific aircraft over HF/VHF without continuous monitoring' },
  { term:'HFDL',  def:'HF Data Link — digital data communication between aircraft and ground stations over HF radio' },
  { term:'STANAG 4285', def:'NATO standardisation agreement for HF data modem; up to 3 600 bps over HF channels' },
  { term:'SINCGARS', def:'Single Channel Ground and Airborne Radio System — US military VHF frequency-hopping tactical radio' },
  { term:'HaveQuick', def:'NATO military UHF frequency-hopping anti-jam voice communication system' },
  { term:'MUOS',  def:'Mobile User Objective System — US military narrowband UHF SATCOM constellation replacing legacy FLTSATCOM' },

  { cat:'Navigation & Satellite' },
  { term:'GPS',   def:'Global Positioning System — US satellite navigation constellation (24+ MEO satellites)' },
  { term:'GNSS',  def:'Global Navigation Satellite System — umbrella term for GPS, GLONASS, Galileo, BeiDou' },
  { term:'GLONASS', def:'GLObal NAvigation Satellite System — Russian GNSS constellation' },
  { term:'Galileo', def:'European Union GNSS constellation' },
  { term:'BeiDou', def:'Chinese GNSS constellation (BDS)' },
  { term:'SBAS',  def:'Satellite Based Augmentation System — geostationary corrections improving GNSS to ~1 m (WAAS, EGNOS)' },
  { term:'RTK',   def:'Real Time Kinematic — carrier-phase GNSS positioning; centimetre accuracy using base station' },
  { term:'MEO',   def:'Medium Earth Orbit — altitude ~2 000–35 786 km; used by GNSS satellites (~20 200 km)' },
  { term:'LEO',   def:'Low Earth Orbit — altitude ~160–2 000 km; used by Iridium, Starlink, weather satellites' },
  { term:'GEO',   def:'Geostationary Earth Orbit — 35 786 km altitude; satellite appears stationary over equator' },
  { term:'VOR',   def:'VHF Omnidirectional Range — ground-based aviation navaid providing bearing information' },
  { term:'ILS',   def:'Instrument Landing System — precision approach system using localizer and glideslope beams' },
  { term:'DME',   def:'Distance Measuring Equipment — airborne interrogator/ground transponder providing slant range to aircraft' },
  { term:'TACAN', def:'Tactical Air Navigation — military equivalent of VOR/DME combined in a single system' },
  { term:'NDB',   def:'Non-Directional Beacon — simple radio beacon; aircraft ADF determines bearing to it' },
  { term:'ADF',   def:'Automatic Direction Finder — aircraft receiver that determines bearing to an NDB' },
  { term:'ADS-B', def:'Automatic Dependent Surveillance–Broadcast — aircraft broadcast GPS position on 1090 MHz; enables real-time tracking' },
  { term:'SSR',   def:'Secondary Surveillance Radar — ATC radar using transponder interrogation (Mode A/C/S) at 1030/1090 MHz' },
  { term:'IFF',   def:'Identification Friend or Foe — military transponder system to identify friendly aircraft/vehicles' },
  { term:'LORAN-C', def:'Long Range Navigation — hyperbolic navigation using precisely timed LF pulses' },
  { term:'eLoran', def:'Enhanced LORAN — modernised LORAN-C as GPS backup with improved accuracy' },

  { cat:'Amateur Radio Terms' },
  { term:'DX',    def:'Long distance communication or a distant station' },
  { term:'DXpedition', def:'Expedition to a rare/remote location to provide contacts to amateur operators' },
  { term:'QRM',   def:'Man-made interference (from other stations)' },
  { term:'QRN',   def:'Natural noise/interference (atmospheric, static)' },
  { term:'QRP',   def:'Low power operation (typically ≤5 W); also a Q-code meaning "reduce power"' },
  { term:'QRO',   def:'High power operation; Q-code meaning "increase power"' },
  { term:'QSO',   def:'A radio contact or conversation between two stations' },
  { term:'QSL',   def:'Confirmation of contact; QSL card is the traditional written confirmation' },
  { term:'QTH',   def:'Station location / position' },
  { term:'QSY',   def:'Change frequency; "QSY to 7.150" means move to that frequency' },
  { term:'RST',   def:'Readability (1–5), Signal strength (1–9), Tone (1–9) — standard signal report system' },
  { term:'CQ',    def:'General call to any station — "calling any station"' },
  { term:'73',    def:'Best regards — traditional amateur radio sign-off' },
  { term:'DE',    def:'"From" — used in CW/Morse to identify the calling station' },
  { term:'FT8',   def:'Franke-Taylor 8-FSK — weak-signal digital mode; 15-second transmit periods; -20 dB sensitivity' },
  { term:'WSPR',  def:'Weak Signal Propagation Reporter — beacon mode for studying propagation; sub-noise-floor detection' },
  { term:'JS8Call', def:'Keyboard-to-keyboard messaging mode built on FT8 modulation' },
  { term:'MSK144', def:'Meteor scatter digital mode; 72 ms frames designed for brief ionised trail reflections' },
  { term:'RTTY',  def:'Radio Teletype — digital text mode using FSK; one of the oldest digital modes' },
  { term:'SSTV',  def:'Slow Scan Television — still images transmitted over HF radio in ~1-2 minutes' },
  { term:'APRS',  def:'Automatic Packet Reporting System — real-time position/telemetry on 144.39 MHz (USA)' },
  { term:'ATV',   def:'Amateur Television — full-motion video transmitted by amateur operators' },
  { term:'EME',   def:'Earth-Moon-Earth ("moonbounce") — signals reflected off the Moon; ~2.4 s round trip' },
  { term:'TEP',   def:'Trans-Equatorial Propagation — VHF signals refracted across the magnetic equator; range 4 000–8 000 km' },
  { term:'WARC band', def:'Bands allocated at 1979 World Administrative Radio Conference (12 m, 17 m, 30 m); no contests' },
  { term:'NVIS',  def:'Near Vertical Incidence Skywave — signals sent nearly straight up, reflected by ionosphere for ~0-600 km coverage' },
  { term:'D-STAR', def:'Digital Smart Technologies for Amateur Radio — digital voice/data protocol by ICOM' },
  { term:'C4FM',  def:'Continuous 4-level FM — Yaesu System Fusion digital voice modulation' },
  { term:'CB',    def:'Citizens Band — licence-free personal radio service around 27 MHz' },
  { term:'ARISS', def:'Amateur Radio on the International Space Station — programme enabling ham contacts with ISS crew' },

  { cat:'Propagation Terms' },
  { term:'Ground wave', def:'Signal that follows the Earth\'s surface; dominant at LF/MF; range depends on power and terrain' },
  { term:'Sky wave',    def:'Signal refracted by ionosphere back to Earth; enables long-distance HF communication' },
  { term:'Line of sight (LoS)', def:'Direct path between transmitter and receiver; dominant above ~30 MHz (VHF+)' },
  { term:'Skip',         def:'Phenomenon where a radio signal "skips" off the ionosphere and returns to Earth at a distant point, bypassing intermediate areas' },
  { term:'Skip zone',   def:'The "dead zone" between the outer limit of ground-wave reception and where the first sky wave returns — no signal is received within this area' },
  { term:'Skip distance', def:'The minimum distance from a transmitter at which a sky wave signal can be received after ionospheric refraction' },
  { term:'F-layer / F2-layer', def:'Upper ionosphere layer (150-500 km); primary layer for long-distance HF refraction' },
  { term:'E-layer',     def:'Ionosphere layer at ~90-150 km; sporadic E can reflect VHF signals' },
  { term:'D-layer',     def:'Lowest ionosphere layer (~60-90 km); absorbs HF during daytime; disappears at night' },
  { term:'Sporadic E',  def:'Unpredictable patches of intense ionisation in E-layer; can propagate VHF (50-150 MHz)' },
  { term:'Tropo ducting',def:'Temperature inversion traps VHF/UHF signals in duct along Earth\'s surface; 100s of km range' },
  { term:'Knife-edge diffraction', def:'Signal bends around sharp obstacles (hills, buildings); extends range beyond LoS' },
  { term:'Rain fade',   def:'Signal attenuation due to rain absorption; significant above ~10 GHz, negligible below ~4 GHz' },
  { term:'Multipath',   def:'Signal arrives via multiple paths (reflections) causing constructive/destructive interference' },
  { term:'Fading',      def:'Fluctuation in received signal strength caused by multipath, ionospheric changes, or movement; types include Rayleigh, Rician, selective' },
  { term:'QSB',         def:'Fading — Q-code used to report signal strength variations' },
  { term:'MUF',         def:'Maximum Usable Frequency — highest frequency that will be refracted by the ionosphere for a given path; above this, signals pass into space' },
  { term:'LUF',         def:'Lowest Usable Frequency — lowest frequency usable for a given path; below this, D-layer absorption is too great' },
  { term:'Critical frequency', def:'Highest frequency reflected by an ionospheric layer at vertical incidence; related to MUF by the secant of the launch angle' },
  { term:'NM',    def:'Nautical Mile — 1 852 metres; standard distance unit in aviation and maritime' },
  { term:'FL350', def:'Flight Level 350 — altitude of 35 000 feet (standard pressure) ≈ 10 668 m' },
  { term:'Solar cycle',  def:'~11-year cycle of solar activity; high activity improves HF propagation on higher bands' },
  { term:'SFI / Solar Flux Index', def:'Measure of solar radio emission at 2800 MHz; correlates with ionospheric ionisation' },
  { term:'K-index / A-index', def:'Measures of geomagnetic disturbance; high values indicate ionospheric storms that degrade HF propagation' },
  { term:'Greyline', def:'The twilight zone around the Earth where sunrise/sunset occurs; enhanced HF propagation along this path due to transitioning D-layer' },

  { cat:'Receiver Controls & Functions' },
  { term:'Squelch', def:'Threshold control that mutes the receiver audio when no signal (or a signal below the set level) is present; types include carrier, CTCSS, and DCS squelch' },
  { term:'AGC',  def:'Automatic Gain Control — circuit that adjusts receiver gain to maintain constant audio output despite varying signal strength' },
  { term:'AFC',  def:'Automatic Frequency Control — circuit that locks the receiver to a drifting signal by tracking frequency changes' },
  { term:'IF',   def:'Intermediate Frequency — fixed internal frequency used in a superheterodyne receiver for filtering and amplification' },
  { term:'RF',   def:'Radio Frequency — electromagnetic energy in the frequency range used for wireless communication (~3 kHz to 300 GHz)' },
  { term:'ATT / Attenuator', def:'Reduces signal level entering the receiver to prevent overload from strong nearby signals; typically –10 to –20 dB' },
  { term:'Preamp / LNA', def:'Low Noise Amplifier — boosts weak signals before the mixer stage; improves sensitivity at the cost of dynamic range' },
  { term:'Preselector', def:'Tuned bandpass filter before the first mixer; rejects out-of-band signals to improve image rejection and dynamic range' },
  { term:'BFO',  def:'Beat Frequency Oscillator — generates a carrier to make CW and SSB signals audible in a receiver' },
  { term:'ANL',  def:'Automatic Noise Limiter — clips pulse noise (ignition, power lines) above signal level' },
  { term:'NB / Noise blanker', def:'Blanks the receiver during short noise pulses; more effective than ANL for impulse noise (e.g. car ignition)' },
  { term:'Notch filter', def:'Narrow reject filter that removes a single interfering carrier (heterodyne) from the received audio' },
  { term:'Passband tuning', def:'Shifts the IF filter passband to reject adjacent-channel interference without retuning' },
  { term:'RIT',  def:'Receiver Incremental Tuning — fine-tunes the receive frequency without changing the transmit frequency' },
  { term:'VFO',  def:'Variable Frequency Oscillator — the tuning control of a radio; determines the operating frequency' },
  { term:'Scan', def:'Automatic stepping through a list of frequencies or memory channels, pausing when a signal is detected' },
  { term:'Search', def:'Sweeping a frequency range between user-defined limits looking for active signals; similar to scan but range-based' },
  { term:'Step size', def:'Frequency increment between adjacent tuning positions; e.g. 5 kHz, 8.33 kHz, 12.5 kHz, 25 kHz depending on band/mode' },
  { term:'Memory channel', def:'Stored frequency with associated mode, step, CTCSS tone and other settings for quick recall' },
  { term:'Priority channel', def:'A memory channel the receiver checks at regular intervals regardless of current tuning position' },
  { term:'Dual watch', def:'Monitoring two frequencies simultaneously by rapidly switching between them' },
  { term:'Band scope', def:'Visual display showing signal activity across a frequency range around the current tuning position; also called spectrum display' },
  { term:'Waterfall', def:'Time-based spectrum display where the vertical axis is time and colour represents signal strength; useful for identifying digital modes' },
  { term:'Discriminator', def:'FM demodulator circuit that converts frequency variations back to audio; discriminator output provides unfiltered audio for digital decoding' },
  { term:'IF output', def:'Intermediate frequency signal output jack for external processing, recording, or SDR analysis' },

  { cat:'Receiver Architectures' },
  { term:'Superheterodyne', def:'Receiver that converts incoming RF to a fixed IF using a mixer and local oscillator; dominant architecture since the 1930s' },
  { term:'Double/Triple conversion', def:'Superheterodyne with 2 or 3 IF stages for improved selectivity and image rejection; used in wideband receivers like the AOR AR5700D' },
  { term:'Direct conversion', def:'Receiver that mixes RF directly to baseband (zero IF); simple but susceptible to DC offset and LO leakage' },
  { term:'SDR',  def:'Software Defined Radio — receiver/transmitter where filtering, demodulation and decoding are done in software rather than hardware' },
  { term:'Heterodyne', def:'Mixing two signals to produce sum and difference frequencies; the basis of superheterodyne reception' },
  { term:'PLL',  def:'Phase Locked Loop — circuit that locks an oscillator to a reference frequency; used for stable, accurate tuning' },
  { term:'DDS',  def:'Direct Digital Synthesis — generates precise waveforms digitally; used in modern receiver local oscillators for fine step sizes' },
  { term:'Image rejection', def:'Suppression of unwanted mixer products (image frequency) that would alias into the IF passband; improved by preselection and multiple conversion' },
  { term:'Dynamic range', def:'Range between the weakest signal a receiver can detect and the strongest it can handle without distortion; measured in dB' },
  { term:'Intermodulation', def:'Spurious signals generated when two or more strong signals mix in a non-linear device (amplifier, mixer); IMD3 is the most common' },

  { cat:'Antenna Types & Terms' },
  { term:'Dipole', def:'Basic half-wave antenna; two quarter-wave elements fed at centre; omnidirectional in the horizontal plane' },
  { term:'Yagi-Uda', def:'Directional antenna with driven element, reflector, and one or more directors; high gain and narrow beamwidth' },
  { term:'Whip', def:'Vertical monopole antenna; quarter-wave over a ground plane; omnidirectional; common on handhelds and vehicles' },
  { term:'Discone', def:'Wideband antenna shaped like a disc over a cone; popular for scanner receivers; covers ~25 MHz to 1.3 GHz' },
  { term:'Log-periodic', def:'Wideband directional antenna with multiple dipole elements of varying length; constant gain over a wide frequency range' },
  { term:'Parabolic dish', def:'High-gain antenna using a parabolic reflector; used for satellite, radar, and microwave point-to-point links' },
  { term:'Gain', def:'Increase in signal power provided by an antenna in a specific direction, relative to an isotropic (dBi) or dipole (dBd) reference' },
  { term:'dBi', def:'Decibels relative to an isotropic radiator — measures antenna gain compared to a theoretical point source' },
  { term:'dBd', def:'Decibels relative to a dipole — measures antenna gain compared to a half-wave dipole; dBi = dBd + 2.15' },
  { term:'SWR / VSWR', def:'(Voltage) Standing Wave Ratio — measure of impedance match between antenna and feedline; 1:1 is perfect; >3:1 indicates significant mismatch' },
  { term:'Feedline / Coax', def:'Cable connecting the radio to the antenna; coaxial cable (RG-58, RG-213, LMR-400) is most common; loss increases with frequency' },
  { term:'Balun', def:'Balanced-to-unbalanced transformer; connects a balanced antenna (dipole) to unbalanced feedline (coax)' },
  { term:'ERP',  def:'Effective Radiated Power — actual power radiated by an antenna relative to a dipole, accounting for transmitter power, feedline loss, and antenna gain' },
  { term:'EIRP', def:'Effective Isotropic Radiated Power — same as ERP but referenced to an isotropic antenna; EIRP = ERP + 2.15 dB' },

  { cat:'Signal Measurement' },
  { term:'S-meter', def:'Signal strength meter; S1–S9 in 6 dB steps, then dB over S9; S9 = –73 dBm on HF, –93 dBm on VHF' },
  { term:'dB',   def:'Decibel — logarithmic ratio unit; 3 dB = double power, 10 dB = 10× power, 20 dB = 100× power' },
  { term:'dBm',  def:'Decibels relative to one milliwatt — absolute power unit; 0 dBm = 1 mW' },
  { term:'dBμV', def:'Decibels relative to one microvolt — signal level unit commonly used in receiver specifications' },
  { term:'Sensitivity', def:'Minimum signal level a receiver can detect at a specified SNR; typically quoted in dBm or μV for 12 dB SINAD' },
  { term:'Selectivity', def:'Ability of a receiver to separate a desired signal from adjacent-channel signals; determined by IF filter bandwidth' },
  { term:'SNR',  def:'Signal-to-Noise Ratio — ratio of signal power to noise power; higher is better; measured in dB' },
  { term:'SINAD', def:'Signal-to-Noise-and-Distortion ratio — combines noise and distortion into one figure of merit; 12 dB SINAD is the standard sensitivity threshold' },

  { cat:'Operating Modes & Procedures' },
  { term:'Simplex', def:'Transmit and receive on the same frequency; both stations take turns' },
  { term:'Duplex', def:'Transmit and receive on different frequencies simultaneously; used by repeaters and cellular' },
  { term:'Half-duplex', def:'Transmit and receive on different frequencies but not simultaneously; push-to-talk operation' },
  { term:'Repeater', def:'Station that receives a signal on one frequency and retransmits it on another, extending communication range' },
  { term:'Offset', def:'Frequency difference between a repeater\'s input (RX) and output (TX) frequencies; e.g. ±600 kHz on 2 m' },
  { term:'PTT',  def:'Push To Talk — button or signal that switches a radio from receive to transmit mode' },
  { term:'VOX',  def:'Voice Operated Exchange — automatically keys the transmitter when audio is detected; hands-free operation' },
  { term:'CTCSS', def:'Continuous Tone Coded Squelch System — sub-audible tone (67–254.1 Hz) transmitted to open only matching receivers; also called PL tone' },
  { term:'DCS',  def:'Digital Coded Squelch — digital sub-audible code transmitted for selective calling; 104 standard codes' },
  { term:'DTMF', def:'Dual Tone Multi-Frequency — touch-tone signalling using pairs of audio frequencies; used for phone dialling, repeater control and remote access' },
  { term:'Trunking', def:'Shared radio system that dynamically assigns channels from a pool to users on demand; more efficient spectrum use than fixed channels' },
  { term:'Phonetic alphabet', def:'NATO/ICAO standard: Alpha, Bravo, Charlie… used to spell call signs and words clearly over radio' },

  { cat:'Technologies & Other' },
  { term:'ISM band', def:'Industrial, Scientific, Medical — unlicensed frequency bands (e.g. 2.4 GHz, 5.8 GHz)' },
  { term:'Beamforming', def:'Antenna technique focusing signal energy toward specific users using phase arrays' },
  { term:'Massive MIMO', def:'MIMO with 64+ antenna elements (e.g. 64T64R) — key 5G technology for capacity' },
  { term:'SAN',    def:'Storage Area Network — high-speed network providing block-level data storage access' },
  { term:'BW',     def:'Bandwidth — width of frequency range used by a signal or channel' },
  { term:'FirstNet', def:'US nationwide public safety broadband network on LTE Band 14 (758-768 / 788-798 MHz)' },
  { term:'Repack / Digital dividend', def:'Reclaiming TV broadcast spectrum and reallocating it to mobile broadband' },
  { term:'C/A code', def:'Coarse/Acquisition code — civilian GPS pseudo-random code; ~3-5 m accuracy' },
  { term:'P(Y) code', def:'Precision encrypted GPS code — military; centimetre-level accuracy' },
  { term:'aptX',  def:'Qualcomm audio codec for Bluetooth; near-CD quality at lower latency than SBC' },
  { term:'BLE',   def:'Bluetooth Low Energy — power-efficient Bluetooth variant for IoT, beacons, sensors' },
  { term:'Zigbee', def:'IEEE 802.15.4-based wireless protocol for low-power IoT mesh networks' },
  { term:'Thread', def:'IPv6-based mesh networking protocol for IoT devices; runs on 802.15.4 radio' },
  { term:'LoRa',  def:'Long Range — chirp spread spectrum modulation for low-power wide-area IoT networks; range up to 15 km' },
  { term:'FMCW',  def:'Frequency Modulated Continuous Wave — radar technique sweeping frequency for range/velocity measurement' },
  { term:'FDMA',  def:'Frequency Division Multiple Access — each user allocated a distinct frequency channel (used in GLONASS L1)' },
  { term:'TDMA',  def:'Time Division Multiple Access — users share a frequency channel by transmitting in assigned time slots (used in GSM, DMR, P25 Phase 2)' },
  { term:'PMR446', def:'Private Mobile Radio 446 MHz — European licence-free personal radio service; 500 mW ERP' },
  { term:'FRS',   def:'Family Radio Service — US licence-free UHF personal radio on 462/467 MHz; up to 2 W' },
  { term:'GMRS',  def:'General Mobile Radio Service — US UHF personal radio requiring licence; up to 50 W on some channels' },
  { term:'CBRS',  def:'Citizens Broadband Radio Service — US shared 3.5 GHz spectrum for 5G/LTE; three-tier access model' },
  { term:'OIRT',  def:'Organisation Internationale de Radiodiffusion — used FM band I (66-74 MHz) in Soviet/Russian broadcasting' },
  { term:'DFS',   def:'Dynamic Frequency Selection — radar avoidance mechanism required for WiFi on 5 GHz channels' },
  { term:'NEXRAD', def:'Next-Generation Radar (WSR-88D) — US national network of S-band Doppler weather radars' },
  { term:'TDWR',  def:'Terminal Doppler Weather Radar — airport wind-shear detection radar' },
  { term:'ATC',   def:'Air Traffic Control' },

/* tiny wavelength SVG vis */
function waveVis(wlText, color) {
  const num = parseFloat(wlText);
  if (isNaN(num)) return '';
  if (wlText.includes('cm')) { /* cm */ }
  else if (wlText.includes(' m') && !wlText.includes('km')) { /* m */ }
  const cycles = Math.max(1, Math.min(12, Math.round(8 - Math.log10(num))));
  const w = 200, h = 30;
  let path = 'M0,' + (h/2);
  for (let i = 0; i <= cycles * 20; i++) {
    const x = (i / (cycles * 20)) * w;
    const y = h/2 + Math.sin((i / 20) * Math.PI * 2) * (h/2 - 2);
    path += ' L' + x.toFixed(1) + ',' + y.toFixed(1);
  }
  return '<div class="wave-vis">' +
    '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' +
      '<path d="' + path + '" fill="none" stroke="' + color + '" stroke-width="1.5" opacity=".5"/>' +
    '</svg>' +
    '<span class="wave-label">λ ≈ ' + wlText + '</span>' +
  '</div>';
}

/* well-known frequencies renderer */
/* parse a frequency string like '14.074 MHz' or '66–74 MHz' into [lo,hi] in MHz */
function parseFreqMHz(s) {
  var nums = s.match(/[\d.]+/g);
  if (!nums) return null;
  var unit = 1;
  if (/GHz/i.test(s)) unit = 1000;
  else if (/MHz/i.test(s)) unit = 1;
  else if (/kHz/i.test(s)) unit = 0.001;
  var lo = parseFloat(nums[0]) * unit;
  var hi = nums.length > 1 ? parseFloat(nums[1]) * unit : lo;
  if (hi < lo && unit === 1) hi = hi; /* already correct */
  return [lo, hi];
}

function buildWKF(bandId, subFreq) {
  var list = WKF[bandId];
  if (!list || !list.length) return '';
  var sub = parseFreqMHz(subFreq);
  if (!sub) return '';
  /* widen range by 5% each side for edge cases */
  var span = sub[1] - sub[0] || sub[0] * 0.01;
  var lo = sub[0] - span * 0.05;
  var hi = sub[1] + span * 0.05;
  var filtered = list.filter(function(e) {
    var r = parseFreqMHz(e.freq);
    if (!r) return false;
    return r[1] >= lo && r[0] <= hi; /* overlaps */
  });
  if (!filtered.length) return '';
  var regions = [
    { key:'UK', cls:'wkf-uk', label:'United Kingdom' },
    { key:'USA', cls:'wkf-usa', label:'United States' },
    { key:'RU', cls:'wkf-ru', label:'Russia' },
  ];
  var html = '<div class="wkf-section"><h3>Well-Known Frequencies</h3>';
  regions.forEach(function(r) {
    var items = filtered.filter(function(e) { return e.region === r.key; });
    if (!items.length) return;
    html += '<div class="wkf-region"><h4 class="' + r.cls + '">' + r.label + '</h4>' +
      '<table class="wkf-table"><tr><th>Freq</th><th>Call / ID</th><th>Mode</th><th>Description</th></tr>';
    items.forEach(function(e) {
      html += '<tr><td class="wkf-freq">' + e.freq + '</td><td>' + e.call +
        '</td><td class="wkf-mod">' + e.mode + '</td><td>' + e.desc + '</td></tr>';
    });
    html += '</table></div>';
  });
  html += '</div>';
  return html;
}

/* ── Atmosphere layers diagram (SVG) ──────────────────────── */
function buildAtmoDiagram() {
  const lt = isLight();
  const w = 900, h = 400;
  /* layers: name, bottom altitude (km), top (km), colour, opacity */
  const layers = [
    { name:'Troposphere', bot:0, top:12, color:'#2a5a4a', note:'Weather, tropo ducting (VHF/UHF)' },
    { name:'Stratosphere', bot:12, top:50, color:'#2a4a6a', note:'Stable; no significant radio effect' },
    { name:'D-Layer', bot:60, top:90, color:'#6a3030', note:'Absorbs HF by day; vanishes at night' },
    { name:'E-Layer', bot:90, top:150, color:'#6a6a30', note:'Sporadic E reflects VHF; MF reflection' },
    { name:'F1-Layer', bot:150, top:250, color:'#306a30', note:'Merges with F2 at night' },
    { name:'F2-Layer', bot:250, top:500, color:'#30306a', note:'Primary HF refraction layer; DX engine' },
  ];
  /* piecewise scale: 0-100km gets 40% of height, 100-520km gets 60% */
  const usable = h - 100;
  const split = 0.4 * usable; /* pixels for 0-100km */
  const scale = y => {
    if (y <= 100) return h - 70 - (y / 100) * split;
    return h - 70 - split - ((y - 100) / 420) * (usable - split);
  };

  let svg = '<div class="prop-section"><h3>Atmospheric Layers & Ionosphere</h3>' +
    '<svg class="atmo-diagram" viewBox="0 0 ' + w + ' ' + h + '">';

  /* background */
  svg += '<rect x="0" y="0" width="' + w + '" height="' + h + '" fill="' + (lt?'#f0f2f6':'#0a0c14') + '" rx="4"/>';

  /* altitude axis */
  [0, 50, 100, 200, 300, 400, 500].forEach(alt => {
    const y = scale(alt);
    svg += '<line x1="55" y1="' + y + '" x2="' + (w-10) + '" y2="' + y + '" stroke="' + (lt?'#d0d5e0':'#1a1f2e') + '" stroke-width="0.5" stroke-dasharray="3,3"/>';
    svg += '<text x="50" y="' + (y+4) + '" fill="' + (lt?'#5a6878':'#a0b0c8') + '" font-size="11" text-anchor="end">' + alt + ' km</text>';
  });

  /* draw layers */
  layers.forEach(l => {
    const y1 = scale(l.top);
    const y2 = scale(l.bot);
    svg += '<rect x="65" y="' + y1 + '" width="' + (w-85) + '" height="' + (y2-y1) + '" fill="' + l.color + '" opacity="0.4" rx="2"/>';
    const mid = (y1 + y2) / 2;
    svg += '<text x="75" y="' + (mid+4) + '" fill="' + (lt?'#2a3040':'#d0dce8') + '" font-size="13" font-weight="600">' + l.name + '</text>';
    svg += '<text x="' + (w-20) + '" y="' + (mid+4) + '" fill="' + (lt?'#3a4558':'#c0ccd8') + '" font-size="11" text-anchor="end">' + l.note + '</text>';;
  });

  /* Earth surface */
  const ground = scale(0);
  svg += '<rect x="65" y="' + ground + '" width="' + (w-85) + '" height="6" fill="' + (lt?'#a8d4a8':'#1a3020') + '" rx="1"/>';
  svg += '<text x="75" y="' + (ground+20) + '" fill="' + (lt?'#2a7a50':'#8abba0') + '" font-size="11" font-weight="500">Earth Surface</text>';

  /* draw propagation arrows */
  /* Sky wave — bouncing off F2 (draw first, behind other elements) */
  const f2mid = (scale(500) + scale(250)) / 2;
  const skyX1 = 160, skyPeakX = w/3 + 10, skyX2 = w*2/3 - 30;
  svg += '<path d="M' + skyX1 + ',' + (ground-3) + ' L' + skyPeakX + ',' + (f2mid+10) + ' L' + skyX2 + ',' + (ground-3) + '" fill="none" stroke="' + (lt?'#669900':'#aaff33') + '" stroke-width="2"/>';
  svg += '<text x="' + (skyPeakX+15) + '" y="' + (f2mid-2) + '" fill="' + (lt?'#669900':'#aaff33') + '" font-size="11" font-weight="500">Sky Wave / F2 (HF)</text>';

  /* Line of sight — short line near ground */
  const losY = ground - 12;
  svg += '<line x1="' + skyX1 + '" y1="' + losY + '" x2="' + ((skyX1 + skyX2)/2) + '" y2="' + losY + '" stroke="' + (lt?'#00884a':'#33ff88') + '" stroke-width="2"/>';
  /* Label above the green LoS line */
  const losMidX = (skyX1 + (skyX1 + skyX2)/2) / 2;
  svg += '<text x="' + losMidX + '" y="' + (losY - 6) + '" fill="' + (lt?'#00884a':'#33ff88') + '" font-size="11" font-weight="500" text-anchor="middle">Line of Sight (VHF/UHF/SHF)</text>';

  /* Ground wave — curved line along surface */
  svg += '<path d="M100,' + (ground-2) + ' Q' + (w/2) + ',' + (ground-30) + ' ' + (w-120) + ',' + (ground-2) + '" fill="none" stroke="' + (lt?'#aa8800':'#ffc833') + '" stroke-width="2" stroke-dasharray="4,2"/>';
  /* Label below the line */
  svg += '<text x="' + (w/2) + '" y="' + (ground + 38) + '" fill="' + (lt?'#aa8800':'#ffc833') + '" font-size="11" font-weight="500" text-anchor="middle">Ground Wave (LF/MF)</text>';

  svg += '</svg></div>';
  return svg;
}

/* ── Propagation modes description ────────────────────────── */
function buildPropModes() {
  return '<div class="prop-section"><h3>Propagation Modes</h3>' +
    '<table class="detail-table">' +
    row('Ground Wave', 'Signal follows Earth\'s curvature. Dominant below ~2 MHz. Range: 100–3 000 km depending on frequency, power, and ground conductivity. Reliable day and night.') +
    row('Sky Wave', 'Signal refracted by ionosphere (F-layer) back to Earth. Primary mode for HF (3–30 MHz). Enables intercontinental communication. Strongly affected by time of day, season, and solar cycle.') +
    row('NVIS', 'Near Vertical Incidence Skywave. Signal sent nearly straight up and reflected down. Covers 0–600 km radius with no skip zone. Best on 2–10 MHz. Used for regional emergency comms.') +
    row('Line of Sight', 'Direct path; dominant above 30 MHz (VHF and up). Range limited by antenna height and Earth\'s curvature. At 2 m height: ~5 km. At 30 m tower: ~25 km. At FL350 aircraft: ~370 km.') +
    row('Tropo Ducting', 'Temperature inversion creates atmospheric duct trapping VHF/UHF signals. Extends range to 500+ km over water. Common in coastal and desert regions.') +
    row('Sporadic E', 'Unpredictable dense ionisation patches at ~100 km altitude. Reflects signals up to ~150 MHz. Duration: minutes to hours. Enables surprise VHF DX to ~2 000 km.') +
    row('Meteor Scatter', 'Signals reflected off ionised meteor trails at ~80–120 km altitude. Brief bursts (0.5–10 s). Used at 30–100 MHz. Random but predictable rates during annual meteor showers.') +
    row('EME (Moonbounce)', 'Signals bounced off the Moon\'s surface. Round-trip delay ~2.4 s. Path loss ~250 dB. Requires high power and large antennas. Works at VHF through microwave frequencies.') +
    row('Skip / Skip Zone', 'The "dead zone" between the outer limit of ground-wave reception and where the first sky wave returns to Earth. Within the skip zone, no signal is received. Skip distance depends on frequency, ionisation level and transmission angle. At HF (3–30 MHz), skip zones typically range from 100 km to 4 000+ km — higher frequencies produce longer skip. Below ~3 MHz, ground wave fills the gap so skip zones rarely form. Above ~30 MHz, ionospheric refraction is normally absent so there is no skip — signals travel line-of-sight only (except during sporadic-E or TEP events on lower VHF).') +
    '</table>' +
    buildSkipDiagram() +
    '</div>';
}

/* ── Skip Zone diagram (SVG) ─────────────────────────────── */
function buildSkipDiagram() {
  const lt = isLight();
  const w = 900, h = 340;

  /* palette */
  const bg        = lt ? '#f0f2f6' : '#0a0c14';
  const ground    = lt ? '#a8d4a8' : '#1a3020';
  const groundTx  = lt ? '#2a7a50' : '#8abba0';
  const ionoFill  = lt ? '#c8d8f0' : '#1a2040';
  const ionoLine  = lt ? '#8899bb' : '#334466';
  const ionoTxt   = lt ? '#5566aa' : '#7788cc';
  const skyClr    = lt ? '#669900' : '#aaff33';
  const gwClr     = lt ? '#aa8800' : '#ffc833';
  const skipFill  = lt ? 'rgba(204,34,34,0.12)' : 'rgba(255,68,68,0.10)';
  const skipStroke = lt ? '#cc2222' : '#ff4444';
  const dimTxt    = lt ? '#5a6878' : '#6a7a90';
  const labelTxt  = lt ? '#3a4558' : '#c0ccd8';
  const arrowClr  = lt ? '#cc6600' : '#ff8833';

  /* key Y positions */
  const earthY   = 260;   /* top of earth band */
  const earthH   = 20;
  const ionoTopY = 30;
  const ionoBotY = 80;

  /* X positions */
  const towerX   = 100;   /* transmitter tower base */
  const towerH   = 60;    /* tower height in px */
  const towerTop = earthY - towerH;

  const gwEndX   = 320;   /* where ground wave fades */
  const skipEndX = 680;   /* where sky wave lands */
  const rxX      = skipEndX;

  let s = '<svg class="atmo-diagram" viewBox="0 0 ' + w + ' ' + h + '">';

  /* background */
  s += '<rect x="0" y="0" width="' + w + '" height="' + h + '" fill="' + bg + '" rx="4"/>';

  /* ionosphere band (curved) */
  s += '<path d="M0,' + ionoBotY + ' Q' + (w/2) + ',' + (ionoBotY + 20) + ' ' + w + ',' + ionoBotY + ' L' + w + ',' + ionoTopY + ' Q' + (w/2) + ',' + (ionoTopY + 12) + ' 0,' + ionoTopY + ' Z" fill="' + ionoFill + '" stroke="' + ionoLine + '" stroke-width="0.5"/>';
  /* crosshatch fill for ionosphere */
  s += '<defs><pattern id="ionoHatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">' +
       '<line x1="0" y1="0" x2="0" y2="8" stroke="' + ionoLine + '" stroke-width="0.5" opacity="0.35"/>' +
       '</pattern></defs>';
  s += '<path d="M0,' + ionoBotY + ' Q' + (w/2) + ',' + (ionoBotY + 20) + ' ' + w + ',' + ionoBotY + ' L' + w + ',' + ionoTopY + ' Q' + (w/2) + ',' + (ionoTopY + 12) + ' 0,' + ionoTopY + ' Z" fill="url(#ionoHatch)"/>';
  s += '<text x="' + (w - 20) + '" y="' + ((ionoTopY + ionoBotY) / 2 + 4) + '" fill="' + ionoTxt + '" font-size="12" font-weight="600" text-anchor="end">IONOSPHERE</text>';

  /* earth surface — gentle upward curve to indicate Earth curvature */
  s += '<path d="M0,' + earthY + ' Q' + (w/2) + ',' + (earthY - 18) + ' ' + w + ',' + earthY + ' L' + w + ',' + h + ' L0,' + h + ' Z" fill="' + ground + '" opacity="0.5"/>';
  s += '<path d="M0,' + earthY + ' Q' + (w/2) + ',' + (earthY - 18) + ' ' + w + ',' + earthY + '" fill="none" stroke="' + groundTx + '" stroke-width="1.5"/>';

  /* transmitter tower */
  var tb = earthY;
  var tt = towerTop;
  s += '<line x1="' + towerX + '" y1="' + tb + '" x2="' + towerX + '" y2="' + tt + '" stroke="' + labelTxt + '" stroke-width="2.5"/>';
  /* tower crossbars */
  for (var ci = 1; ci <= 4; ci++) {
    var cy = tb - ci * (towerH / 5);
    var cw = 4 + ci * 1.5;
    s += '<line x1="' + (towerX - cw) + '" y1="' + cy + '" x2="' + (towerX + cw) + '" y2="' + cy + '" stroke="' + labelTxt + '" stroke-width="1"/>';
  }
  /* tower diagonals */
  s += '<line x1="' + (towerX - 8) + '" y1="' + tb + '" x2="' + towerX + '" y2="' + tt + '" stroke="' + labelTxt + '" stroke-width="1" opacity="0.6"/>';
  s += '<line x1="' + (towerX + 8) + '" y1="' + tb + '" x2="' + towerX + '" y2="' + tt + '" stroke="' + labelTxt + '" stroke-width="1" opacity="0.6"/>';
  /* antenna tip */
  s += '<line x1="' + towerX + '" y1="' + tt + '" x2="' + towerX + '" y2="' + (tt - 10) + '" stroke="' + skipStroke + '" stroke-width="1.5"/>';
  s += '<circle cx="' + towerX + '" cy="' + (tt - 12) + '" r="2" fill="' + skipStroke + '"/>';
  /* "TX" label */
  s += '<text x="' + towerX + '" y="' + (earthY + 18) + '" fill="' + labelTxt + '" font-size="11" font-weight="600" text-anchor="middle">TX</text>';

  /* ── Ground wave: hatched wedge from tower along earth ─── */
  var gwMidY = earthY - 20;
  /* wedge shape */
  s += '<path d="M' + towerX + ',' + (towerTop + 10) + ' Q' + ((towerX + gwEndX) / 2) + ',' + (gwMidY - 30) + ' ' + gwEndX + ',' + (earthY - 2) + ' L' + towerX + ',' + (earthY - 2) + ' Z" fill="' + gwClr + '" opacity="0.12"/>';
  /* hatching */
  s += '<defs><pattern id="gwHatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">' +
       '<line x1="0" y1="0" x2="0" y2="6" stroke="' + gwClr + '" stroke-width="0.8" opacity="0.4"/>' +
       '</pattern></defs>';
  s += '<path d="M' + towerX + ',' + (towerTop + 10) + ' Q' + ((towerX + gwEndX) / 2) + ',' + (gwMidY - 30) + ' ' + gwEndX + ',' + (earthY - 2) + ' L' + towerX + ',' + (earthY - 2) + ' Z" fill="url(#gwHatch)"/>';
  /* upper edge */
  s += '<path d="M' + towerX + ',' + (towerTop + 10) + ' Q' + ((towerX + gwEndX) / 2) + ',' + (gwMidY - 30) + ' ' + gwEndX + ',' + (earthY - 2) + '" fill="none" stroke="' + gwClr + '" stroke-width="1.5"/>';
  /* label */
  s += '<text x="' + ((towerX + gwEndX) / 2 - 20) + '" y="' + (earthY - 34) + '" fill="' + gwClr + '" font-size="12" font-weight="600">GROUND WAVE</text>';

  /* ── Sky wave: line from tower up to ionosphere, then down ── */
  var skyBounceX = (towerX + skipEndX) / 2 + 30;
  var skyBounceY = ionoBotY + 10;
  s += '<path d="M' + towerX + ',' + (towerTop - 10) + ' L' + skyBounceX + ',' + skyBounceY + ' L' + skipEndX + ',' + (earthY - 2) + '" fill="none" stroke="' + skyClr + '" stroke-width="2.5"/>';
  /* label along upper leg */
  var skyLabelX = (towerX + skyBounceX) / 2 - 10;
  var skyLabelY = (towerTop - 10 + skyBounceY) / 2 - 6;
  s += '<text x="' + skyLabelX + '" y="' + skyLabelY + '" fill="' + skyClr + '" font-size="12" font-weight="600" transform="rotate(-42,' + skyLabelX + ',' + skyLabelY + ')">SKY WAVE</text>';

  /* ── Skip zone shaded area ── */
  var skipStartX = gwEndX;
  s += '<rect x="' + skipStartX + '" y="' + (earthY - 50) + '" width="' + (skipEndX - skipStartX) + '" height="50" fill="' + skipFill + '" rx="2"/>';
  /* diagonal hatching in skip zone */
  s += '<defs><pattern id="skipHatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">' +
       '<line x1="0" y1="0" x2="0" y2="10" stroke="' + skipStroke + '" stroke-width="0.6" opacity="0.25"/>' +
       '</pattern></defs>';
  s += '<rect x="' + skipStartX + '" y="' + (earthY - 50) + '" width="' + (skipEndX - skipStartX) + '" height="50" fill="url(#skipHatch)" rx="2"/>';
  /* skip zone label */
  var skipMidX = (skipStartX + skipEndX) / 2;
  s += '<text x="' + skipMidX + '" y="' + (earthY - 58) + '" fill="' + skipStroke + '" font-size="12" font-weight="700" text-anchor="middle">SKIP ZONE</text>';
  s += '<text x="' + skipMidX + '" y="' + (earthY - 24) + '" fill="' + skipStroke + '" font-size="10" text-anchor="middle" opacity="0.8">no signal received</text>';

  /* ── Dimension arrows ── */
  /* Skip zone arrow (horizontal between gwEndX and skipEndX) */
  var arrY1 = earthY + 38;
  s += '<line x1="' + skipStartX + '" y1="' + arrY1 + '" x2="' + skipEndX + '" y2="' + arrY1 + '" stroke="' + arrowClr + '" stroke-width="1.5"/>';
  s += '<polygon points="' + skipStartX + ',' + arrY1 + ' ' + (skipStartX + 7) + ',' + (arrY1 - 4) + ' ' + (skipStartX + 7) + ',' + (arrY1 + 4) + '" fill="' + arrowClr + '"/>';
  s += '<polygon points="' + skipEndX + ',' + arrY1 + ' ' + (skipEndX - 7) + ',' + (arrY1 - 4) + ' ' + (skipEndX - 7) + ',' + (arrY1 + 4) + '" fill="' + arrowClr + '"/>';
  s += '<text x="' + skipMidX + '" y="' + (arrY1 - 5) + '" fill="' + arrowClr + '" font-size="11" font-weight="600" text-anchor="middle">SKIP ZONE</text>';

  /* Skip distance arrow (full span from tower to landing) */
  var arrY2 = earthY + 58;
  s += '<line x1="' + towerX + '" y1="' + arrY2 + '" x2="' + skipEndX + '" y2="' + arrY2 + '" stroke="' + arrowClr + '" stroke-width="1.5"/>';
  s += '<polygon points="' + towerX + ',' + arrY2 + ' ' + (towerX + 7) + ',' + (arrY2 - 4) + ' ' + (towerX + 7) + ',' + (arrY2 + 4) + '" fill="' + arrowClr + '"/>';
  s += '<polygon points="' + skipEndX + ',' + arrY2 + ' ' + (skipEndX - 7) + ',' + (arrY2 - 4) + ' ' + (skipEndX - 7) + ',' + (arrY2 + 4) + '" fill="' + arrowClr + '"/>';
  var distMidX = (towerX + skipEndX) / 2;
  s += '<text x="' + distMidX + '" y="' + (arrY2 - 5) + '" fill="' + arrowClr + '" font-size="11" font-weight="600" text-anchor="middle">SKIP DISTANCE</text>';

  /* vertical dashed guide lines for arrows */
  s += '<line x1="' + skipStartX + '" y1="' + (earthY + 2) + '" x2="' + skipStartX + '" y2="' + (arrY1 + 6) + '" stroke="' + dimTxt + '" stroke-width="0.5" stroke-dasharray="3,3"/>';
  s += '<line x1="' + skipEndX + '" y1="' + (earthY + 2) + '" x2="' + skipEndX + '" y2="' + (arrY2 + 6) + '" stroke="' + dimTxt + '" stroke-width="0.5" stroke-dasharray="3,3"/>';
  s += '<line x1="' + towerX + '" y1="' + (earthY + 20) + '" x2="' + towerX + '" y2="' + (arrY2 + 6) + '" stroke="' + dimTxt + '" stroke-width="0.5" stroke-dasharray="3,3"/>';

  /* RX marker */
  s += '<circle cx="' + skipEndX + '" cy="' + (earthY - 4) + '" r="4" fill="' + skyClr + '"/>';
  s += '<text x="' + skipEndX + '" y="' + (earthY + 18) + '" fill="' + labelTxt + '" font-size="11" font-weight="600" text-anchor="middle">RX</text>';

  s += '</svg>';
  return s;
}

/* ── Day/Night World Map ──────────────────────────────────── */
function buildWorldMap() {
  const lt = isLight();
  const w = 900, h = 440;
  const now = new Date();

  /* calculate subsolar point */
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  const declination = -23.44 * Math.cos(2 * Math.PI / 365 * (dayOfYear + 10));
  const utcHours = now.getUTCHours() + now.getUTCMinutes() / 60;
  const subsolarLon = (12 - utcHours) * 15;

  /* equirectangular projection */
  const mapL = 50, mapR = w - 20, mapT = 38, mapB = h - 30;
  function lonLatToXY(lon, lat) {
    const x = mapL + (lon + 180) / 360 * (mapR - mapL);
    const y = mapT + (90 - lat) / 180 * (mapB - mapT);
    return [x, y];
  }

  let svg = '<div class="prop-section"><h3>Current Day/Night Terminator — ' +
    now.toUTCString().replace(/ GMT$/, ' UTC') + '</h3>' +
    '<div class="world-map-wrap"><svg viewBox="0 0 ' + w + ' ' + h + '">';

  /* background */
  svg += '<rect x="0" y="0" width="' + w + '" height="' + h + '" fill="' + (lt?'#f0f2f6':'#0a0c14') + '" rx="4"/>';

  /* map area background — daytime base fill */
  svg += '<rect x="' + mapL + '" y="' + mapT + '" width="' + (mapR-mapL) + '" height="' + (mapB-mapT) + '" fill="' + (lt?'#e8eef8':'#0c1220') + '"/>';

  /* ── Grid lines (every 15° = 1 timezone) ── */
  for (let lon = -180; lon <= 180; lon += 15) {
    const [x] = lonLatToXY(lon, 0);
    const isMajor = lon % 30 === 0;
    svg += '<line x1="' + x + '" y1="' + mapT + '" x2="' + x + '" y2="' + mapB + '" stroke="' + (lt?'#c8cdd8':'#161c28') + '" stroke-width="' + (isMajor ? '0.6' : '0.3') + '"/>';
  }
  for (let lat = -90; lat <= 90; lat += 15) {
    const [, y] = lonLatToXY(0, lat);
    const isMajor = lat % 30 === 0;
    if (y >= mapT && y <= mapB)
      svg += '<line x1="' + mapL + '" y1="' + y + '" x2="' + mapR + '" y2="' + y + '" stroke="' + (lt?'#c8cdd8':'#161c28') + '" stroke-width="' + (isMajor ? '0.6' : '0.3') + '"/>';
  }
  /* equator */
  var [,eqY] = lonLatToXY(0,0);
  svg += '<line x1="' + mapL + '" y1="' + eqY + '" x2="' + mapR + '" y2="' + eqY + '" stroke="' + (lt?'#a0a8b8':'#2a3040') + '" stroke-width="0.8" stroke-dasharray="4,3"/>';

  /* latitude axis labels */
  [-60,-30,0,30,60].forEach(function(lat){
    var xy = lonLatToXY(-180, lat);
    svg += '<text x="' + (mapL - 4) + '" y="' + (xy[1]+3) + '" fill="' + (lt?'#5a6878':'#7a8a9e') + '" font-size="8" text-anchor="end">' + (lat > 0 ? lat+'°N' : lat < 0 ? (-lat)+'°S' : 'EQ') + '</text>';
  });

  /* ── Timezone labels at top ── */
  for (let lon = -180; lon <= 180; lon += 15) {
    const [x] = lonLatToXY(lon, 0);
    const utcOff = lon / 15;
    const label = utcOff === 0 ? 'UTC' : (utcOff > 0 ? '+' + utcOff : '' + utcOff);
    svg += '<text x="' + x + '" y="' + (mapT - 4) + '" fill="' + (lt?'#7a8898':'#5a6a80') + '" font-size="7" text-anchor="middle">' + label + '</text>';
  }
  /* longitude labels at bottom */
  for (let lon = -180; lon <= 180; lon += 30) {
    const [x] = lonLatToXY(lon, 0);
    svg += '<text x="' + x + '" y="' + (mapB + 14) + '" fill="' + (lt?'#5a6878':'#7a8a9e') + '" font-size="8" text-anchor="middle">' + (lon === 0 ? '0°' : lon > 0 ? lon + '°E' : (-lon) + '°W') + '</text>';
  }

  /* ── Compute terminator ── */
  const nightPoints = [];
  for (let lon = -180; lon <= 180; lon += 2) {
    const hourAngle = (lon - subsolarLon) * Math.PI / 180;
    const decRad = declination * Math.PI / 180;
    const termLat = Math.atan(-Math.cos(hourAngle) / Math.tan(decRad)) * 180 / Math.PI;
    nightPoints.push({ lon: lon, lat: termLat });
  }

  /* FIX: night is on the opposite side from the subsolar point */
  const nightIsNorth = declination < 0;

  /* ── Night polygon — darker fill ── */
  let nightPath = '';
  if (nightIsNorth) {
    nightPath = 'M' + lonLatToXY(-180, 90).join(',');
    nightPoints.forEach(function(p){ var c = lonLatToXY(p.lon, p.lat); nightPath += ' L' + c[0] + ',' + c[1]; });
    nightPath += ' L' + lonLatToXY(180, 90).join(',') + ' Z';
  } else {
    nightPath = 'M' + lonLatToXY(-180, -90).join(',');
    nightPoints.forEach(function(p){ var c = lonLatToXY(p.lon, p.lat); nightPath += ' L' + c[0] + ',' + c[1]; });
    nightPath += ' L' + lonLatToXY(180, -90).join(',') + ' Z';
  }
  svg += '<path d="' + nightPath + '" fill="' + (lt?'#8898b0':'#000310') + '" opacity="' + (lt?'0.40':'0.65') + '"/>';

  /* ── Day polygon — lighter fill ── */
  let dayPath = '';
  if (nightIsNorth) {
    dayPath = 'M' + lonLatToXY(-180, -90).join(',');
    nightPoints.forEach(function(p){ var c = lonLatToXY(p.lon, p.lat); dayPath += ' L' + c[0] + ',' + c[1]; });
    dayPath += ' L' + lonLatToXY(180, -90).join(',') + ' Z';
  } else {
    dayPath = 'M' + lonLatToXY(-180, 90).join(',');
    nightPoints.forEach(function(p){ var c = lonLatToXY(p.lon, p.lat); dayPath += ' L' + c[0] + ',' + c[1]; });
    dayPath += ' L' + lonLatToXY(180, 90).join(',') + ' Z';
  }
  svg += '<path d="' + dayPath + '" fill="' + (lt?'#f8f0d8':'#0e1830') + '" opacity="' + (lt?'0.35':'0.50') + '"/>';

  /* ── Terminator line ── */
  let termPath = 'M';
  nightPoints.forEach(function(p, i){
    var c = lonLatToXY(p.lon, p.lat);
    termPath += (i === 0 ? '' : ' L') + c[0] + ',' + c[1];
  });
  /* terminator drawn after continents so it renders on top */

  /* ── Continent outlines (Natural Earth 110m) ── */

/* ── band vs propagation quick reference ──────────────────── */
function buildPropBandTable() {
  return '<div class="prop-section"><h3>Band ↔ Propagation Quick Reference</h3>' +
    '<table class="detail-table">' +
    row('VLF (15–30 kHz)', 'Ground wave follows Earth curvature. Penetrates seawater. Global range from single TX with multi-km antenna.') +
    row('LF (30–300 kHz)', 'Ground wave dominant. Stable 1 000+ km range. Time signals, LORAN, longwave broadcast. Slight sky wave at night.') +
    row('MF (300 kHz–3 MHz)', 'Ground wave ~100 km by day. Sky wave emerges at night extending range to 1 000+ km. AM broadcast sweet spot.') +
    row('HF (3–30 MHz)', 'Sky wave via F-layer. Range: intercontinental. Highly dependent on solar cycle, time of day, season. DX at night on lower HF; DX by day on upper HF.') +
    row('VHF (30–300 MHz)', 'Line of sight. Extended by tropo ducting, sporadic E (rare), meteor scatter, EME. FM broadcast, aviation, amateur 2 m.') +
    row('UHF (300 MHz–3 GHz)', 'Strictly line of sight. Building penetration varies. Cellular, WiFi, Bluetooth, GPS, satellite, radar. Rain fade negligible.') +
    row('SHF (3–5 GHz)', 'Line of sight. Needs directional antennas for distance. 5G mid-band, C-band satellite, weather radar. Rain fade begins to be measurable.') +
    '</table></div>';
}

/* ── ripple effect on click ──────────────────────────────── */
document.addEventListener('click', e => {
  const btn = e.target.closest('.band-btn, .sub-btn');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const rip = document.createElement('span');
  rip.className = 'ripple';
  rip.style.width = rip.style.height = size + 'px';
  rip.style.left = (e.clientX - rect.left - size/2) + 'px';
  rip.style.top  = (e.clientY - rect.top - size/2) + 'px';
  btn.style.position = 'relative';
  btn.style.overflow = 'hidden';
  btn.appendChild(rip);
  rip.addEventListener('animationend', () => rip.remove());
});

/* ── keyboard nav ────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  const allTabs = [...BANDS.map(b => ({ type:'band', data:b })), { type:'glossary' }, { type:'propagation' }];

  /* find current tab index */
  let curIdx = -1;
  if (activeSpecial === 'glossary') curIdx = BANDS.length;
  else if (activeSpecial === 'propagation') curIdx = BANDS.length + 1;
  else curIdx = BANDS.findIndex(b => b.id === activeBand);

  /* Up / Down — navigate bands + ABC + PROP */
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    let next = e.key === 'ArrowDown' ? curIdx + 1 : curIdx - 1;
    next = Math.max(0, Math.min(next, allTabs.length - 1));
    const tab = allTabs[next];
    if (tab.type === 'glossary') openGlossary();
    else if (tab.type === 'propagation') openPropagation();
    else { activeSpecial = null; selectBand(tab.data); }
  }

  /* Left / Right — navigate sub-bands within active band */
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    if (activeSpecial) return; /* no sub-bands for glossary/propagation */
    const band = BANDS.find(b => b.id === activeBand);
    if (!band) return;
    e.preventDefault();
    const subs = band.subs;
    let subIdx = activeSub ? subs.findIndex(s => s.name === activeSub) : -1;
    if (e.key === 'ArrowRight') subIdx = Math.min(subIdx + 1, subs.length - 1);
    else subIdx = Math.max(subIdx - 1, 0);
    const subBtns = document.querySelectorAll('#subInner .sub-btn');
    if (subBtns[subIdx]) selectSub(band, subs[subIdx], subBtns[subIdx]);
  }
});
