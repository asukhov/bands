<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Interactive radio frequency bands reference — 15 kHz to 5 GHz spectrum with modulations, propagation and usage details.">
    <title>RF Spectrum // 15 kHz – 5 GHz</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── reset & base ──────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'JetBrains Mono',monospace;background:#0a0a0f;color:#c8ccd0;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── scanline overlay ──────────────────────────────────────── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px)}

/* ── app shell ─────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}

/* ── top bar ───────────────────────────────────────────────── */
.top-bar{flex:0 0 32px;display:flex;align-items:center;padding:0 14px;
  background:linear-gradient(90deg,#0c0e16,#10131c);border-bottom:1px solid #1e2536;gap:10px;z-index:10}
.top-bar .title{font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#00ff88;white-space:nowrap}
.top-bar .range{font-size:12px;color:#9aaabe;letter-spacing:1px}
.top-bar .dot{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px #00ff88;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── main content area ─────────────────────────────────────── */
.main{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── left: band panel ──────────────────────────────────────── */
.band-panel{flex:0 0 100px;display:flex;flex-direction:column;justify-content:safe center;gap:3px;padding:4px;
  background:linear-gradient(180deg,#0c0e16,#0e1018);border-right:1px solid #1a1f2e;z-index:5;overflow-y:auto;overflow-x:hidden}
.band-panel::-webkit-scrollbar{width:2px}
.band-panel::-webkit-scrollbar-thumb{background:#1e2536;border-radius:2px}

/* ── SC‑style band button ──────────────────────────────────── */
.band-btn{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px 4px;cursor:pointer;user-select:none;transition:all .25s ease;flex-shrink:0;
  clip-path:polygon(6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px),0 6px);
  background:linear-gradient(180deg,#151a28 0%,#0f1220 50%,#151a28 100%)}
.band-btn .label{font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:color .25s}
.band-btn .freq{font-size:10px;color:#8a9aae;letter-spacing:.5px;margin-top:1px;transition:color .25s}
.band-btn:hover{filter:brightness(1.3)}
.band-btn:hover .label{color:#c0d0e0}
.band-btn.active{animation:pulse-glow 2.5s ease-in-out infinite}
.band-btn.active .label{font-weight:700}

/* per‑band accent colours (spectrum order) */
.band-btn[data-band="vlf"]  .label{color:#8a5050}.band-btn[data-band="vlf"].active  .label{color:#ff4444}
.band-btn[data-band="lf"]   .label{color:#8a6a40}.band-btn[data-band="lf"].active   .label{color:#ff8833}
.band-btn[data-band="mf"]   .label{color:#8a8030}.band-btn[data-band="mf"].active   .label{color:#ffc833}
.band-btn[data-band="hf"]   .label{color:#608a30}.band-btn[data-band="hf"].active   .label{color:#aaff33}
.band-btn[data-band="vhf"]  .label{color:#308a5a}.band-btn[data-band="vhf"].active  .label{color:#33ff88}
.band-btn[data-band="uhf"]  .label{color:#305a8a}.band-btn[data-band="uhf"].active  .label{color:#33aaff}
.band-btn[data-band="shf"]  .label{color:#60408a}.band-btn[data-band="shf"].active  .label{color:#aa66ff}

/* special tab buttons */
.band-btn[data-band="glossary"] .label{color:#5a6a7a}
.band-btn[data-band="glossary"].active .label{color:#88ccff}
.band-btn[data-band="glossary"]::after{background:#88ccff}
.band-btn[data-band="propagation"] .label{color:#5a6a7a}
.band-btn[data-band="propagation"].active .label{color:#ffaa44}
.band-btn[data-band="propagation"]::after{background:#ffaa44}

@keyframes pulse-glow{0%,100%{filter:drop-shadow(0 0 4px rgba(255,255,255,.15)) brightness(1.1)}50%{filter:drop-shadow(0 0 10px rgba(255,255,255,.25)) brightness(1.25)}}

/* small coloured bar under button */
.band-btn::after{content:'';position:absolute;bottom:2px;left:20%;right:20%;height:2px;border-radius:1px;opacity:.35;transition:opacity .25s}
.band-btn.active::after{opacity:.9}
.band-btn[data-band="vlf"]::after{background:#ff4444}
.band-btn[data-band="lf"]::after{background:#ff8833}
.band-btn[data-band="mf"]::after{background:#ffc833}
.band-btn[data-band="hf"]::after{background:#aaff33}
.band-btn[data-band="vhf"]::after{background:#33ff88}
.band-btn[data-band="uhf"]::after{background:#33aaff}
.band-btn[data-band="shf"]::after{background:#aa66ff}

/* separator line between bands and special tabs */
.band-sep{height:1px;background:linear-gradient(90deg,transparent,#1e2536,transparent);margin:2px 8px;flex-shrink:0}

/* ── middle: sub‑band panel ────────────────────────────────── */
.sub-panel{flex:0 0 0;overflow:hidden;transition:flex-basis .35s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0;
  display:flex;flex-direction:column;background:#0b0d15;border-right:1px solid #1a1f2e}
.sub-panel.open{flex-basis:210px;opacity:1}
.sub-panel-inner{display:flex;flex-direction:column;gap:3px;padding:6px;overflow-y:auto;overflow-x:hidden;flex:1;min-height:0}
.sub-panel-inner::-webkit-scrollbar{width:3px}
.sub-panel-inner::-webkit-scrollbar-thumb{background:#1e2536;border-radius:2px}
.sub-panel-header{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#9aaabe;padding:4px 8px 2px;white-space:nowrap;flex-shrink:0}

/* sub‑band button */
.sub-btn{position:relative;padding:5px 8px;cursor:pointer;user-select:none;font-size:13px;font-weight:500;
  color:#6a7a90;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .2s ease;
  clip-path:polygon(4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px),0 4px);
  background:linear-gradient(180deg,#13162200,#111420)}
.sub-btn:hover{background:linear-gradient(180deg,#1a1e30,#151828);color:#a0b0c8}
.sub-btn.active{color:#fff;background:linear-gradient(180deg,#181e32,#141a2c)}
.sub-btn .sub-freq{display:block;font-size:11px;color:#8a9aae;margin-top:1px;font-weight:400;transition:color .2s}
.sub-btn.active .sub-freq{color:#a0b0c8}

/* ── right: detail panel ───────────────────────────────────── */
.detail-panel{flex:1;overflow:hidden;opacity:0;transition:opacity .3s ease .1s;display:flex;flex-direction:column;
  background:linear-gradient(135deg,#0a0c14,#0d0f18);min-width:0}
.detail-panel.open{opacity:1}
.detail-inner{padding:12px 16px;overflow-y:auto;flex:1;min-height:0}
.detail-inner::-webkit-scrollbar{width:3px}
.detail-inner::-webkit-scrollbar-thumb{background:#1e2536;border-radius:2px}

/* detail: header */
.detail-title{font-size:20px;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.detail-subtitle{font-size:12px;color:#9aaabe;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}

/* detail: data table */
.detail-table{width:100%;border-collapse:collapse;table-layout:fixed}
.detail-table{width:100%;border-collapse:collapse;table-layout:auto}
.detail-table th{text-align:left;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#9aaec4;
  padding:8px 12px;border-bottom:1px solid #1a1f2e;white-space:nowrap;vertical-align:top}
.detail-table td{font-size:14px;color:#d4e0ec;padding:8px 12px;border-bottom:1px solid #12151e;vertical-align:top;word-wrap:break-word;overflow-wrap:break-word}
.detail-table tr:last-child th,.detail-table tr:last-child td{border-bottom:none}

/* coloured accent bar in detail */
.accent-bar{height:3px;border-radius:1px;margin-bottom:10px;opacity:.7}

/* wavelength visual */
.wave-vis{display:flex;align-items:center;gap:6px;margin-top:8px;padding:6px 0}
.wave-vis svg{flex-shrink:0}
.wave-vis .wave-label{font-size:12px;color:#9aaabe;letter-spacing:.5px}

/* ── glossary terms in detail ──────────────────────────────── */
.glossary-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.glossary-item{padding:5px 10px;border-bottom:1px solid #12151e}
.glossary-item:nth-child(odd){border-right:1px solid #12151e}
.glossary-term{font-size:13px;font-weight:600;color:#88ccff;margin-bottom:1px}
.glossary-def{font-size:13px;color:#c0ccd8;line-height:1.4}
.glossary-cat{grid-column:1/-1;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#9aaec4;padding:8px 10px 4px;border-bottom:1px solid #1a1f2e}

/* ── propagation panel ─────────────────────────────────────── */
.prop-section{margin-bottom:14px}
.prop-section h3{font-size:14px;font-weight:600;color:#ffaa44;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.prop-section p{font-size:13px;color:#c0ccd8;line-height:1.5;margin-bottom:4px}
.atmo-diagram{width:100%;max-width:900px}
.atmo-diagram text{font-family:'JetBrains Mono',monospace}
.world-map-wrap{position:relative;width:100%;max-width:900px;margin-top:6px}
.world-map-wrap svg{width:100%;height:auto}
.world-map-wrap text{font-family:'JetBrains Mono',monospace}
.prop-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
.prop-legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#b0c0d0}
.prop-legend-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── placeholder / empty state ─────────────────────────────── */
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:#6a7a8e;font-size:14px;letter-spacing:2px;text-transform:uppercase;user-select:none}

/* ── well-known frequencies section ────────────────────────── */
.wkf-section{margin-top:12px;border-top:1px solid #1a1f2e;padding-top:10px}
.wkf-section h3{font-size:13px;font-weight:600;color:#e0b888;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.wkf-region{margin-bottom:10px}
.wkf-region h4{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;padding:3px 8px;border-left:3px solid;display:inline-block}
.wkf-region h4.wkf-uk{color:#55aaff;border-color:#55aaff}
.wkf-region h4.wkf-usa{color:#ff6655;border-color:#ff6655}
.wkf-region h4.wkf-ru{color:#ffcc33;border-color:#ffcc33}
.wkf-table{width:100%;border-collapse:collapse;margin-bottom:6px}
.wkf-table th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#d4a574;padding:4px 8px;border-bottom:1px solid #1a1f2e;white-space:nowrap}
.wkf-table td{font-size:12px;color:#c8ccd0;padding:3px 8px;border-bottom:1px solid #0e1118}
.wkf-table tr:last-child td{border-bottom:none}
.wkf-table .wkf-freq{color:#e8e0d8;font-weight:500;white-space:nowrap}
.wkf-table .wkf-mod{color:#d4a574;white-space:nowrap}

/* ── bottom bar ────────────────────────────────────────────── */
.bottom-bar{flex:0 0 24px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;
  background:#0c0e16;border-top:1px solid #1a1f2e;font-size:12px;color:#7a8a9e;letter-spacing:1px}

/* ── click ripple ──────────────────────────────────────────── */
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(2.5);opacity:0}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);pointer-events:none;animation:ripple .5s ease-out forwards}

/* ── responsive: tablet ────────────────────────────────────── */
@media(max-width:900px){
  .band-panel{flex:0 0 82px;padding:5px 4px;gap:3px}
  .band-btn .label{font-size:14px}
  .band-btn .freq{font-size:8px}
  .sub-panel.open{flex-basis:175px}
  .sub-btn{font-size:12px;padding:4px 6px}
  .detail-table th{font-size:11px}
  .detail-table td{font-size:13px}
  .glossary-grid{grid-template-columns:1fr}
  .glossary-item:nth-child(odd){border-right:none}
}

/* ── responsive: mobile ────────────────────────────────────── */
@media(max-width:600px){
  .app{overflow-y:auto}
  .main{flex-direction:column;overflow-y:auto;overflow-x:hidden}
  .band-panel{flex:0 0 auto;flex-direction:row;justify-content:flex-start;overflow-x:auto;padding:4px;gap:4px;border-right:none;border-bottom:1px solid #1a1f2e}
  .band-sep{width:1px;height:auto;margin:2px 0;min-height:20px}
  .band-btn{min-width:56px;padding:5px 6px}
  .band-btn .label{font-size:13px}
  .band-btn .freq{display:none}
  .sub-panel{flex:0 0 0;border-right:none;border-bottom:1px solid #1a1f2e;transition:flex-basis .3s,opacity .25s}
  .sub-panel.open{flex-basis:auto}
  .sub-panel-inner{flex-direction:row;flex-wrap:wrap;overflow-y:visible;padding:4px}
  .sub-btn{flex:0 0 auto;font-size:12px;padding:4px 8px}
  .detail-panel{flex:1 1 auto;overflow-y:auto}
  .detail-panel.open{min-height:200px}
  .detail-inner{padding:8px}
  .glossary-grid{grid-template-columns:1fr}
  .glossary-item:nth-child(odd){border-right:none}
  body{overflow:auto}
  html{overflow:auto}
}
</style>
</head>
<body>
<div class="app">

  <!-- top bar -->
  <div class="top-bar">
    <div class="dot"></div>
    <span class="title">Radio Frequency Spectrum</span>
    <span class="range">15 kHz — 5 GHz</span>
  </div>

  <!-- main three‑panel area -->
  <div class="main">

    <!-- LEFT: band buttons -->
    <div class="band-panel" id="bandPanel"></div>

    <!-- MIDDLE: sub‑band buttons -->
    <div class="sub-panel" id="subPanel">
      <div class="sub-panel-header" id="subHeader">Sub‑bands</div>
      <div class="sub-panel-inner" id="subInner"></div>
    </div>

    <!-- RIGHT: detail -->
    <div class="detail-panel" id="detailPanel">
      <div class="empty-state" id="emptyState">← Select a band to begin</div>
      <div class="detail-inner" id="detailInner" style="display:none"></div>
    </div>

  </div>

  <!-- bottom bar -->
  <div class="bottom-bar">
    <span>&copy; 2026 0xFF5 // Crafted with AI for people</span>
    <span id="bandCount"></span>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   FREQUENCY BAND DATA  —  15 kHz → 5 GHz
   ══════════════════════════════════════════════════════════════ */
const BANDS = [
  /* ── VLF ───────────────────────────────────────────────── */
  { id:'vlf', name:'VLF', full:'Very Low Frequency', range:'15 – 30 kHz', color:'#ff4444', subs:[
    { name:'Submarine Communications', freq:'15 – 25 kHz', wl:'12 – 20 km',
      mod:'MSK, FSK', usage:'Military submarine one-way comms',
      prop:'Ground wave follows Earth curvature; penetrates seawater ~20 m',
      maxDist:'10 000+ km (worldwide)',
      desc:'Used by navies worldwide (US NAA 24 kHz, RU ZEVS 82 Hz feeder) to send short coded messages to ballistic‑missile submarines. Extremely low data rates (~300 bps). Requires multi‑km antenna arrays.' },
    { name:'Standard Time & Frequency', freq:'20 – 25 kHz', wl:'12 – 15 km',
      mod:'OOK, CW', usage:'Precise time/frequency distribution',
      prop:'Ground wave; very stable phase over long distances',
      maxDist:'5 000 – 10 000 km',
      desc:'Stations like GBR (16 kHz, UK) and NAA provided frequency standards before GPS. Phase stability allows nanosecond‑class timing over thousands of km.' },
  ]},

  /* ── LF ────────────────────────────────────────────────── */
  { id:'lf', name:'LF', full:'Low Frequency', range:'30 – 300 kHz', color:'#ff8833', subs:[
    { name:'Time Signal Broadcasts', freq:'40 – 77.5 kHz', wl:'3.9 – 7.5 km',
      mod:'OOK (on-off keying)', usage:'Atomic‑clock‑synced time distribution',
      prop:'Ground wave; stable day/night; range 1 500 – 3 000 km',
      maxDist:'1 500 – 3 000 km',
      desc:'DCF77 (77.5 kHz, Germany), WWVB (60 kHz, USA), JJY (40/60 kHz, Japan), MSF (60 kHz, UK). Drives radio‑controlled clocks and watches worldwide.' },
    { name:'LORAN-C Navigation', freq:'90 – 110 kHz', wl:'2.7 – 3.3 km',
      mod:'Pulse, time‑of‑arrival', usage:'Long‑range hyperbolic navigation',
      prop:'Ground wave to ~1 500 km; sky wave further but less precise',
      maxDist:'1 500 – 2 500 km',
      desc:'Chain of synchronised transmitters; receivers triangulate position from pulse arrival times. Accuracy ~100 m. Enhanced LORAN (eLoran) revived as GPS backup.' },
    { name:'Longwave Radio Broadcast', freq:'148.5 – 283.5 kHz', wl:'1.1 – 2.0 km',
      mod:'AM (DSB-FC)', usage:'Public broadcast radio (Europe, Asia, Africa)',
      prop:'Ground wave; reliable over 1 000+ km day and night',
      maxDist:'1 000 – 2 000 km',
      desc:'Stations like BBC Radio 4 (198 kHz), Europe 1 (183 kHz), RTL (234 kHz). Declining in use as FM/DAB expand, but still covers vast rural areas.' },
    { name:'NDB / Locator Beacons', freq:'190 – 300 kHz', wl:'1.0 – 1.6 km',
      mod:'AM, CW (Morse ident)', usage:'Aviation non‑directional beacons',

  /* ── MF ────────────────────────────────────────────────── */

      prop:'Ground wave dominant; sky wave at night causes bearing errors',

      desc:'Upper NDB range; higher‑powered beacons for en‑route navigation. Co‑exists with maritime radiobeacons. Gradually decommissioned worldwide.' },
    { name:'AM Broadcast (MW)', freq:'530 – 1 700 kHz', wl:'176 – 566 m',
      mod:'AM (DSB-FC)', usage:'Public broadcast radio worldwide',
      prop:'Ground wave ~100 km day; sky wave at night extends to 1 000+ km',
      maxDist:'100 km day / 1 000+ km night',
      desc:'The classic "AM radio". Channels spaced 9 kHz (ITU) or 10 kHz (Americas). Night‑time sky‑wave propagation causes distant station interference but also enables DX listening.' },
    { name:'160 m Amateur Radio', freq:'1.8 – 2.0 MHz', wl:'150 – 167 m',
      mod:'SSB, CW, FT8, JS8Call', usage:'Amateur radio "Top Band"',

    { name:'Maritime & Aero HF', freq:'1.6 – 3.0 MHz', wl:'100 – 188 m',
      mod:'SSB, DSC, NBDP', usage:'Ship‑to‑shore & aeronautical comms',

      maxDist:'200 km ground / 1 000 km sky wave',
      desc:'MF maritime distress frequency 2 182 kHz (SSB). GMDSS Digital Selective Calling on 2 187.5 kHz. Also used for regional aeronautical en‑route communications.' },
    { name:'Tropical Shortwave', freq:'2.3 – 2.5 MHz', wl:'120 – 130 m',

  ]},

  /* ── HF ────────────────────────────────────────────────── */
  { id:'hf', name:'HF', full:'High Frequency', range:'3 – 30 MHz', color:'#aaff33', subs:[

    { name:'Utility & Military', freq:'4.0 – 5.06 MHz', wl:'59 – 75 m',

      maxDist:'500 km NVIS / 3 000+ km night',
      desc:'Dense military/utility segment. Home to UVB-76 "The Buzzer" (4.625 MHz), NATO STANAG data links, over-the-horizon radar, and various intelligence services. Also includes amateur 60 m allocations in some countries.' },
    { name:'60 m Amateur', freq:'5.35 – 5.45 MHz', wl:'55 – 56 m',

    { name:'49 m SW Broadcast', freq:'5.9 – 6.2 MHz', wl:'48 – 51 m',

/* tiny wavelength SVG vis */
function waveVis(wlText, color) {
  const num = parseFloat(wlText);
  if (isNaN(num)) return '';
  if (wlText.includes('cm')) { /* cm */ }
  else if (wlText.includes(' m') && !wlText.includes('km')) { /* m */ }
  const cycles = Math.max(1, Math.min(12, Math.round(8 - Math.log10(num))));
  const w = 200, h = 30;
  let path = 'M0,' + (h/2);
  for (let i = 0; i <= cycles * 20; i++) {
    const x = (i / (cycles * 20)) * w;
    const y = h/2 + Math.sin((i / 20) * Math.PI * 2) * (h/2 - 2);
    path += ' L' + x.toFixed(1) + ',' + y.toFixed(1);
  }
  return '<div class="wave-vis">' +
    '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' +
      '<path d="' + path + '" fill="none" stroke="' + color + '" stroke-width="1.5" opacity=".5"/>' +
    '</svg>' +
    '<span class="wave-label">λ ≈ ' + wlText + '</span>' +
  '</div>';
}

/* well-known frequencies renderer */
/* parse a frequency string like '14.074 MHz' or '66–74 MHz' into [lo,hi] in MHz */
function parseFreqMHz(s) {
  var nums = s.match(/[\d.]+/g);
  if (!nums) return null;
  var unit = 1;
  if (/GHz/i.test(s)) unit = 1000;
  else if (/MHz/i.test(s)) unit = 1;
  else if (/kHz/i.test(s)) unit = 0.001;
  var lo = parseFloat(nums[0]) * unit;
  var hi = nums.length > 1 ? parseFloat(nums[1]) * unit : lo;
  if (hi < lo && unit === 1) hi = hi; /* already correct */
  return [lo, hi];
}

function buildWKF(bandId, subFreq) {
  var list = WKF[bandId];
  if (!list || !list.length) return '';
  var sub = parseFreqMHz(subFreq);
  if (!sub) return '';
  /* widen range by 5% each side for edge cases */
  var span = sub[1] - sub[0] || sub[0] * 0.01;
  var lo = sub[0] - span * 0.05;
  var hi = sub[1] + span * 0.05;
  var filtered = list.filter(function(e) {
    var r = parseFreqMHz(e.freq);
    if (!r) return false;
    return r[1] >= lo && r[0] <= hi; /* overlaps */
  });
  if (!filtered.length) return '';
  var regions = [
    { key:'UK', cls:'wkf-uk', label:'United Kingdom' },
    { key:'USA', cls:'wkf-usa', label:'United States' },
    { key:'RU', cls:'wkf-ru', label:'Russia' },
  ];
  var html = '<div class="wkf-section"><h3>Well-Known Frequencies</h3>';
  regions.forEach(function(r) {
    var items = filtered.filter(function(e) { return e.region === r.key; });
    if (!items.length) return;
    html += '<div class="wkf-region"><h4 class="' + r.cls + '">' + r.label + '</h4>' +
      '<table class="wkf-table"><tr><th>Freq</th><th>Call / ID</th><th>Mode</th><th>Description</th></tr>';
    items.forEach(function(e) {
      html += '<tr><td class="wkf-freq">' + e.freq + '</td><td>' + e.call +
        '</td><td class="wkf-mod">' + e.mode + '</td><td>' + e.desc + '</td></tr>';
    });
    html += '</table></div>';
  });
  html += '</div>';
  return html;
}

  const w = 900, h = 400;
  /* layers: name, bottom altitude (km), top (km), colour, opacity */

    { name:'Troposphere', bot:0, top:12, color:'#2a5a4a', note:'Weather, tropo ducting (VHF/UHF)' },
    { name:'Stratosphere', bot:12, top:50, color:'#2a4a6a', note:'Stable; no significant radio effect' },

    { name:'E-Layer', bot:90, top:150, color:'#6a6a30', note:'Sporadic E reflects VHF; MF reflection' },
    { name:'F1-Layer', bot:150, top:250, color:'#306a30', note:'Merges with F2 at night' },
    { name:'F2-Layer', bot:250, top:500, color:'#30306a', note:'Primary HF refraction layer; DX engine' },
  ];
  /* piecewise scale: 0-100km gets 40% of height, 100-520km gets 60% */
  const usable = h - 100;
  const split = 0.4 * usable; /* pixels for 0-100km */
  const scale = y => {
    if (y <= 100) return h - 70 - (y / 100) * split;
    return h - 70 - split - ((y - 100) / 420) * (usable - split);
  };

  let svg = '<div class="prop-section"><h3>Atmospheric Layers & Ionosphere</h3>' +
    '<svg class="atmo-diagram" viewBox="0 0 ' + w + ' ' + h + '">';

  /* background */
  svg += '<rect x="0" y="0" width="' + w + '" height="' + h + '" fill="#0a0c14" rx="4"/>';

  /* altitude axis */
  [0, 50, 100, 200, 300, 400, 500].forEach(alt => {
    const y = scale(alt);
    svg += '<line x1="55" y1="' + y + '" x2="' + (w-10) + '" y2="' + y + '" stroke="#1a1f2e" stroke-width="0.5" stroke-dasharray="3,3"/>';
    svg += '<text x="50" y="' + (y+4) + '" fill="#a0b0c8" font-size="11" text-anchor="end">' + alt + ' km</text>';
  });

  /* draw layers */
  layers.forEach(l => {
    const y1 = scale(l.top);
    const y2 = scale(l.bot);
    svg += '<rect x="65" y="' + y1 + '" width="' + (w-85) + '" height="' + (y2-y1) + '" fill="' + l.color + '" opacity="0.4" rx="2"/>';
    const mid = (y1 + y2) / 2;
    svg += '<text x="75" y="' + (mid+4) + '" fill="#d0dce8" font-size="13" font-weight="600">' + l.name + '</text>';
    svg += '<text x="' + (w-20) + '" y="' + (mid+4) + '" fill="#c0ccd8" font-size="11" text-anchor="end">' + l.note + '</text>';;
  });

  /* Earth surface */
  const ground = scale(0);
  svg += '<rect x="65" y="' + ground + '" width="' + (w-85) + '" height="6" fill="#1a3020" rx="1"/>';
  svg += '<text x="75" y="' + (ground+20) + '" fill="#8abba0" font-size="11" font-weight="500">Earth Surface</text>';

  /* draw propagation arrows */
  /* Sky wave — bouncing off F2 (draw first, behind other elements) */
  const f2mid = (scale(500) + scale(250)) / 2;
  const skyX1 = 160, skyPeakX = w/3 + 10, skyX2 = w*2/3 - 30;
  svg += '<path d="M' + skyX1 + ',' + (ground-3) + ' L' + skyPeakX + ',' + (f2mid+10) + ' L' + skyX2 + ',' + (ground-3) + '" fill="none" stroke="#aaff33" stroke-width="2"/>';
  svg += '<text x="' + (skyPeakX+15) + '" y="' + (f2mid-2) + '" fill="#aaff33" font-size="11" font-weight="500">Sky Wave / F2 (HF)</text>';

  /* Line of sight — short line near ground */
  const losY = ground - 12;
  svg += '<line x1="' + skyX1 + '" y1="' + losY + '" x2="' + ((skyX1 + skyX2)/2) + '" y2="' + losY + '" stroke="#33ff88" stroke-width="2"/>';
  /* Label above the green LoS line */
  const losMidX = (skyX1 + (skyX1 + skyX2)/2) / 2;
  svg += '<text x="' + losMidX + '" y="' + (losY - 6) + '" fill="#33ff88" font-size="11" font-weight="500" text-anchor="middle">Line of Sight (VHF/UHF/SHF)</text>';

  /* Ground wave — curved line along surface */
  svg += '<path d="M100,' + (ground-2) + ' Q' + (w/2) + ',' + (ground-30) + ' ' + (w-120) + ',' + (ground-2) + '" fill="none" stroke="#ffc833" stroke-width="2" stroke-dasharray="4,2"/>';
  /* Label below the line */
  svg += '<text x="' + (w/2) + '" y="' + (ground + 38) + '" fill="#ffc833" font-size="11" font-weight="500" text-anchor="middle">Ground Wave (LF/MF)</text>';

  svg += '</svg></div>';
  return svg;
}

/* ── Propagation modes description ────────────────────────── */
function buildPropModes() {
  return '<div class="prop-section"><h3>Propagation Modes</h3>' +
    '<table class="detail-table">' +
    row('Ground Wave', 'Signal follows Earth\'s curvature. Dominant below ~2 MHz. Range: 100–3 000 km depending on frequency, power, and ground conductivity. Reliable day and night.') +
    row('Sky Wave', 'Signal refracted by ionosphere (F-layer) back to Earth. Primary mode for HF (3–30 MHz). Enables intercontinental communication. Strongly affected by time of day, season, and solar cycle.') +
    row('NVIS', 'Near Vertical Incidence Skywave. Signal sent nearly straight up and reflected down. Covers 0–600 km radius with no skip zone. Best on 2–10 MHz. Used for regional emergency comms.') +
    row('Line of Sight', 'Direct path; dominant above 30 MHz (VHF and up). Range limited by antenna height and Earth\'s curvature. At 2 m height: ~5 km. At 30 m tower: ~25 km. At FL350 aircraft: ~370 km.') +
    row('Tropo Ducting', 'Temperature inversion creates atmospheric duct trapping VHF/UHF signals. Extends range to 500+ km over water. Common in coastal and desert regions.') +
    row('Sporadic E', 'Unpredictable dense ionisation patches at ~100 km altitude. Reflects signals up to ~150 MHz. Duration: minutes to hours. Enables surprise VHF DX to ~2 000 km.') +
    row('Meteor Scatter', 'Signals reflected off ionised meteor trails at ~80–120 km altitude. Brief bursts (0.5–10 s). Used at 30–100 MHz. Random but predictable rates during annual meteor showers.') +
    row('EME (Moonbounce)', 'Signals bounced off the Moon\'s surface. Round-trip delay ~2.4 s. Path loss ~250 dB. Requires high power and large antennas. Works at VHF through microwave frequencies.') +
    '</table></div>';
}

/* ── Day/Night World Map ──────────────────────────────────── */
function buildWorldMap() {
  const w = 880, h = 400;
  const now = new Date();

  /* calculate subsolar point */
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  const declination = -23.44 * Math.cos(2 * Math.PI / 365 * (dayOfYear + 10));
  const utcHours = now.getUTCHours() + now.getUTCMinutes() / 60;
  const subsolarLon = (12 - utcHours) * 15;

  /* simplified world coastline path (Robinson-style, equirectangular for simplicity) */
  function lonLatToXY(lon, lat) {
    const x = 40 + (lon + 180) / 360 * (w - 80);
    const y = 15 + (90 - lat) / 180 * (h - 40);
    return [x, y];
  }

  let svg = '<div class="prop-section"><h3>Current Day/Night Terminator — ' +
    now.toUTCString().replace(/ GMT$/, ' UTC') + '</h3>' +
    '<div class="world-map-wrap"><svg viewBox="0 0 ' + w + ' ' + h + '">';

  /* background */
  svg += '<rect x="0" y="0" width="' + w + '" height="' + h + '" fill="#0a0c14" rx="4"/>';

  /* draw grid lines */
  for (let lon = -180; lon <= 180; lon += 30) {
    const [x] = lonLatToXY(lon, 0);
    svg += '<line x1="' + x + '" y1="15" x2="' + x + '" y2="' + (h-25) + '" stroke="#131720" stroke-width="0.5"/>';
    if (lon % 60 === 0) svg += '<text x="' + x + '" y="' + (h-14) + '" fill="#7a8a9e" font-size="8" text-anchor="middle">' + (lon >= 0 ? lon + '°E' : (-lon) + '°W') + '</text>';
  }
  for (let lat = -60; lat <= 60; lat += 30) {
    const [, y] = lonLatToXY(0, lat);
    svg += '<line x1="40" y1="' + y + '" x2="' + (w-40) + '" y2="' + y + '" stroke="#131720" stroke-width="0.5"/>';
    svg += '<text x="36" y="' + (y+3) + '" fill="#7a8a9e" font-size="8" text-anchor="end">' + (lat >= 0 ? lat + '°N' : (-lat) + '°S') + '</text>';
  }

  /* draw night polygon */
  const nightPoints = [];
  for (let lon = -180; lon <= 180; lon += 2) {
    const hourAngle = (lon - subsolarLon) * Math.PI / 180;
    const decRad = declination * Math.PI / 180;
    /* terminator latitude: where solar elevation = 0 */
    const termLat = Math.atan(-Math.cos(hourAngle) / Math.tan(decRad)) * 180 / Math.PI;
    nightPoints.push({ lon, lat: termLat });
  }

  /* determine which side is night: check if midnight point is north or south of terminator */
  const midnightLon = subsolarLon + 180;
  const testHourAngle = (midnightLon - subsolarLon) * Math.PI / 180;
  const decRad = declination * Math.PI / 180;
  const testTermLat = Math.atan(-Math.cos(testHourAngle) / Math.tan(decRad)) * 180 / Math.PI;
  /* at midnight longitude, the night is above the terminator line if declination > 0 (northern summer) */
  const nightIsNorth = declination > 0;

  let nightPath = '';
  if (nightIsNorth) {
    /* night above terminator */
    nightPath = 'M' + lonLatToXY(-180, 90).join(',');
    nightPoints.forEach(p => { const [x,y] = lonLatToXY(p.lon, p.lat); nightPath += ' L' + x + ',' + y; });
    nightPath += ' L' + lonLatToXY(180, 90).join(',') + ' Z';

  /* draw terminator line */

/* ── ripple effect on click ──────────────────────────────── */
document.addEventListener('click', e => {
  const btn = e.target.closest('.band-btn, .sub-btn');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const rip = document.createElement('span');
  rip.className = 'ripple';
  rip.style.width = rip.style.height = size + 'px';
  rip.style.left = (e.clientX - rect.left - size/2) + 'px';
  rip.style.top  = (e.clientY - rect.top - size/2) + 'px';
  btn.style.position = 'relative';
  btn.style.overflow = 'hidden';
  btn.appendChild(rip);
  rip.addEventListener('animationend', () => rip.remove());
});

/* ── keyboard nav ────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  const allTabs = [...BANDS.map(b => ({ type:'band', data:b })), { type:'glossary' }, { type:'propagation' }];

  /* find current tab index */
  let curIdx = -1;
  if (activeSpecial === 'glossary') curIdx = BANDS.length;
  else if (activeSpecial === 'propagation') curIdx = BANDS.length + 1;
  else curIdx = BANDS.findIndex(b => b.id === activeBand);

  /* Up / Down — navigate bands + ABC + PROP */
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    let next = e.key === 'ArrowDown' ? curIdx + 1 : curIdx - 1;
    next = Math.max(0, Math.min(next, allTabs.length - 1));
    const tab = allTabs[next];
    if (tab.type === 'glossary') openGlossary();
    else if (tab.type === 'propagation') openPropagation();
    else { activeSpecial = null; selectBand(tab.data); }
  }

  /* Left / Right — navigate sub-bands within active band */
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    if (activeSpecial) return; /* no sub-bands for glossary/propagation */
    const band = BANDS.find(b => b.id === activeBand);
    if (!band) return;
    e.preventDefault();
    const subs = band.subs;
    let subIdx = activeSub ? subs.findIndex(s => s.name === activeSub) : -1;
    if (e.key === 'ArrowRight') subIdx = Math.min(subIdx + 1, subs.length - 1);
    else subIdx = Math.max(subIdx - 1, 0);
    const subBtns = document.querySelectorAll('#subInner .sub-btn');
    if (subBtns[subIdx]) selectSub(band, subs[subIdx], subBtns[subIdx]);
  }
});
